<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Profile - Yabisso Dating</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "yabisso-red": "#e53935",
                        "yabisso-yellow": "#fdd835",
                        "yabisso-green": "#43a047",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for neatness */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark border-x border-slate-200 dark:border-slate-800">
<!-- Top App Bar -->
<div class="sticky top-0 z-50 flex items-center bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] text-center">Edit Profile</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Scrollable Content -->
<div class="flex-1 flex flex-col pb-24">
<!-- Photos Section -->
<div class="px-4 pt-6">
<div class="flex items-center justify-between mb-3">
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold">My Photos</h3>
<span class="text-sm text-slate-500 dark:text-slate-400">4/6</span>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- Main Photo -->
<div class="col-span-2 row-span-2 relative group aspect-square">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-2xl border-2 border-primary" data-alt="Close up portrait of a smiling person with braided hair against a colorful city background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBbxuhQ3_UNh-OWWq_eUQsjzYKiOhZtzxRBsj_bhhTpVVjAh5NjjVZy0kdopGxCSjALw3OfPJj1OJaKPY4cuHUxcesZ3D_ItgxI5UvSeEmAWwLbben964XjPAJ39-taLuZ0EJNq6jHcq2tFxPxqJiDcMrNZ4FZSgbngFzcflneoHJAWNQbVHk6UMH1c_2jxQ1fZ5GjnVgtW0fctGhGdMjRRwEKu8mocK97xIZa49kf-dj9MfQhNnGkDKTvdpbbSzoOAEU1yqyGK");'>
</div>
<div class="absolute top-2 left-2 bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">Main</div>
<button class="absolute bottom-2 right-2 bg-background-dark/80 text-white p-1.5 rounded-full backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<!-- Secondary Photos -->
<div class="relative group aspect-square">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-2xl bg-slate-800" data-alt="Person laughing at a cafe table with coffee" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCDdF4GJr5TL-LLyFiIwcuNKyfSfSLTOJFz20rubwFJksgaersHVsbPj2oBZoXdCAwekh6OAcjRVnTos8Gy5XmPBjAwvHIBnRA40SMyyFusIlcbfIGVwfelWSTqbfJUW3IIb1GslydDBQY8ewNZHmuJquSX9qxlpLBWX71TnuPXu9Bqb45WkkAW8B1FzSybQ1hMiNz0B-BQvzRMsXt6APM8n8EvXvzgg5G_zt_UnMT8hUEuNxvyF8mmGRgKJ11-AvJxI2YvSm-Z");'>
</div>
<button class="absolute -top-1.5 -right-1.5 bg-red-500 text-white p-1 rounded-full shadow-md">
<span class="material-symbols-outlined text-[12px] leading-none">close</span>
</button>
</div>
<div class="relative group aspect-square">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-2xl bg-slate-800" data-alt="Silhouette of person hiking on a mountain trail at sunset" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBrC71uM-q4Ntwmo7g_m-aXkAa_4KL0A0Ax0Rnt6For_8F_A0PS6IV40e5Ejwz48k6ItmT2piYxOeuIUIyUNUn3UhXTRUAus8vM7AaNqHp1WMnW7JxQzYHIg7F_taMQimmUSq73BFLs2-1B-rqSIg2r0egXOg639y-Bc-I5Om4wsCBLmV0fK3O_HufKqFAM4UaNpyZflZUQ0UVsAjNXBPdh_mrs5igHcYxwwquGXA7my4Oq1xwD-ZERd2nqi92ZihJ3gUmd6enM");'>
</div>
<button class="absolute -top-1.5 -right-1.5 bg-red-500 text-white p-1 rounded-full shadow-md">
<span class="material-symbols-outlined text-[12px] leading-none">close</span>
</button>
</div>
<!-- Add Photo Slot -->
<div class="relative aspect-square">
<button class="w-full h-full flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-primary dark:hover:border-primary bg-slate-100 dark:bg-slate-800/50 transition-colors text-slate-400 hover:text-primary">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
</button>
</div>
<!-- Empty Slots -->
<div class="relative aspect-square">
<div class="w-full h-full rounded-2xl bg-slate-100 dark:bg-slate-800/30"></div>
</div>
</div>
</div>
<!-- Vibe / Bio Section -->
<div class="px-4 pt-8">
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold mb-2">My Vibe</h3>
<!-- Voice Intro -->
<div class="bg-white dark:bg-slate-800/60 rounded-full p-2 pr-4 flex items-center gap-3 mb-4 shadow-sm border border-slate-100 dark:border-slate-700">
<button class="flex items-center justify-center size-10 rounded-full bg-primary text-white shrink-0 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined">mic</span>
</button>
<div class="flex-1 flex flex-col justify-center h-full">
<div class="flex items-center gap-1 h-6">
<!-- Fake waveform visualization -->
<div class="w-1 h-3 bg-slate-300 dark:bg-slate-500 rounded-full animate-pulse"></div>
<div class="w-1 h-5 bg-primary rounded-full"></div>
<div class="w-1 h-4 bg-primary/70 rounded-full"></div>
<div class="w-1 h-6 bg-primary rounded-full"></div>
<div class="w-1 h-3 bg-primary/50 rounded-full"></div>
<div class="w-1 h-2 bg-slate-300 dark:bg-slate-500 rounded-full"></div>
<div class="w-1 h-4 bg-slate-300 dark:bg-slate-500 rounded-full"></div>
<div class="w-1 h-3 bg-slate-300 dark:bg-slate-500 rounded-full"></div>
</div>
<span class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">Record voice intro (optional)</span>
</div>
<span class="text-xs font-mono text-slate-400">0:00</span>
</div>
<!-- Bio Text Area -->
<div class="relative">
<textarea class="w-full bg-slate-100 dark:bg-slate-800/40 text-slate-900 dark:text-white rounded-2xl p-4 min-h-[120px] focus:ring-2 focus:ring-primary focus:outline-none resize-none border-none placeholder-slate-400 dark:placeholder-slate-500 text-sm leading-relaxed" placeholder="Tell us about yourself... what makes you tick?"></textarea>
<div class="absolute bottom-3 right-4 text-xs text-slate-400">0/300</div>
</div>
</div>
<!-- Basic Info Section -->
<div class="px-4 pt-8">
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold mb-4">The Basics</h3>
<div class="space-y-4">
<!-- Name Input -->
<div class="relative">
<input class="peer block w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent px-4 pb-2.5 pt-5 text-sm text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary appearance-none focus:outline-none" id="name" placeholder=" " type="text" value="Tobi"/>
<label class="absolute left-4 top-4 z-10 origin-[0] -translate-y-2.5 scale-75 transform text-sm text-slate-500 duration-150 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-2.5 peer-focus:scale-75 peer-focus:text-primary" for="name">
                            Display Name
                        </label>
</div>
<div class="flex gap-4">
<!-- Age Input -->
<div class="relative w-1/3">
<input class="peer block w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent px-4 pb-2.5 pt-5 text-sm text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary appearance-none focus:outline-none" id="age" placeholder=" " type="number" value="24"/>
<label class="absolute left-4 top-4 z-10 origin-[0] -translate-y-2.5 scale-75 transform text-sm text-slate-500 duration-150 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-2.5 peer-focus:scale-75 peer-focus:text-primary" for="age">
                                Age
                            </label>
</div>
<!-- Gender Select -->
<div class="relative flex-1">
<select class="peer block w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent px-4 pb-2.5 pt-5 text-sm text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary appearance-none focus:outline-none" id="gender">
<option class="bg-background-light dark:bg-background-dark">Male</option>
<option class="bg-background-light dark:bg-background-dark">Female</option>
<option class="bg-background-light dark:bg-background-dark">Non-binary</option>
</select>
<label class="absolute left-4 top-4 z-10 origin-[0] -translate-y-2.5 scale-75 transform text-sm text-slate-500 duration-150 peer-focus:-translate-y-2.5 peer-focus:scale-75 peer-focus:text-primary" for="gender">
                                Gender
                            </label>
<span class="material-symbols-outlined absolute right-3 top-4 text-slate-500 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Location (Auto-detected) -->
<div class="flex items-center gap-3 p-3 rounded-xl bg-slate-100 dark:bg-slate-800/40">
<div class="size-8 rounded-full bg-yabisso-green/20 flex items-center justify-center text-yabisso-green">
<span class="material-symbols-outlined text-lg">location_on</span>
</div>
<div class="flex-1">
<p class="text-xs text-slate-500 dark:text-slate-400">Location</p>
<p class="text-sm font-semibold text-slate-900 dark:text-white">Lagos, Nigeria</p>
</div>
<button class="text-primary text-xs font-semibold">Refresh</button>
</div>
</div>
</div>
<!-- Passions / Tags Section -->
<div class="px-4 pt-8 pb-4">
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold mb-4">Passions</h3>
<div class="flex flex-wrap gap-2">
<!-- Selected Tags -->
<button class="flex items-center gap-1.5 px-4 py-2 bg-primary text-white rounded-full text-sm font-medium transition-transform active:scale-95 shadow-lg shadow-primary/20 border border-primary">
<span>⚽️</span> Football
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 bg-primary text-white rounded-full text-sm font-medium transition-transform active:scale-95 shadow-lg shadow-primary/20 border border-primary">
<span>🎵</span> Afrobeat
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 bg-primary text-white rounded-full text-sm font-medium transition-transform active:scale-95 shadow-lg shadow-primary/20 border border-primary">
<span>🥘</span> Jollof
                    </button>
<!-- Unselected Tags -->
<button class="flex items-center gap-1.5 px-4 py-2 bg-transparent dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium transition-colors hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary active:scale-95">
<span>✈️</span> Travel
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 bg-transparent dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium transition-colors hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary active:scale-95">
<span>🎨</span> Art
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 bg-transparent dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium transition-colors hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary active:scale-95">
<span>📷</span> Photography
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 bg-transparent dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-full text-sm font-medium transition-colors hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary active:scale-95">
<span>🕶️</span> Fashion
                    </button>
<!-- Add Custom Tag -->
<button class="flex items-center justify-center size-9 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 border border-dashed border-slate-400">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<!-- Bottom Spacer -->
<div class="h-8"></div>
</div>
<!-- Sticky Footer Action -->
<div class="absolute bottom-0 left-0 w-full bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 p-4 pb-8 z-40">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-bold text-base py-3.5 rounded-full shadow-xl shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Save Profile</span>
<span class="material-symbols-outlined text-sm opacity-80">check_circle</span>
</button>
</div>
</div>
</body></html>
