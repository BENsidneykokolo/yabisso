<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso - Driver En Route</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#fbbf24",
                        "yabisso-green": "#22c55e",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#192633",
                        "surface-darker": "#111a22",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Simulating the map route pulse */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .marker-pulse::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(19, 127, 236, 0.5);
            border-radius: 50%;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- MAP SECTION (Full Background) -->
<div class="absolute inset-0 z-0">
<!-- Map Image Background -->
<div class="w-full h-full bg-cover bg-center bg-no-repeat opacity-80" data-alt="Dark mode street map of Lagos with roads and dark blue color scheme" data-location="Lagos" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAvytM_uUeG14f2a3zN1JyMjdCBq3rv0fBItB9XTjoK3wyPpMYoPrFr1ABTB9Ic05awy4fkPFVtxBfBjy7Afs8Oluf2n35g3wwQBMBWIizg_kv7uJC2Iw9UvG95ShvFOwnnk-oRcXep1EBpPRO-4aj9nfRDWHxM4X7ACAWswz7hUFPHSLkb8xPH2I4s9MJIdrM38_qYKjMJkCzx48AXLC3eZtpv8bNTh-5grB487Qh8ffEwKqugNZn23rsb1NgOnr8_lyfehQiU"); filter: grayscale(100%) brightness(0.4) contrast(1.2);'>
</div>
<!-- Map Elements Overlay -->
<div class="absolute inset-0 z-10 pointer-events-none">
<!-- User Location Pin -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="w-4 h-4 bg-white rounded-full border-4 border-primary shadow-[0_0_20px_rgba(19,127,236,0.6)]"></div>
</div>
<!-- Driver Location Car -->
<div class="absolute top-[45%] left-[40%] flex flex-col items-center marker-pulse transition-all duration-1000 ease-in-out">
<div class="bg-surface-darker p-1.5 rounded-full border border-primary shadow-lg relative z-20">
<span class="material-symbols-outlined text-primary text-[20px]">local_taxi</span>
</div>
<!-- Tooltip -->
<div class="mt-2 bg-surface-darker px-3 py-1 rounded-full border border-gray-700 shadow-xl flex items-center gap-1">
<span class="text-xs font-bold text-white whitespace-nowrap">4 min</span>
</div>
</div>
<!-- Simulated Route Line (SVG) -->
<svg class="absolute inset-0 w-full h-full z-0 opacity-60 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<path d="M160 280 Q 150 350 200 350 T 250 450" fill="none" stroke="#137fec" stroke-dasharray="8 4" stroke-linecap="round" stroke-width="4"></path>
</svg>
</div>
</div>
<!-- TOP BAR (Overlay) -->
<div class="relative z-20 flex flex-col w-full bg-gradient-to-b from-black/80 to-transparent pb-8 pt-safe">
<div class="flex items-center justify-between p-4 pt-12"> <!-- pt-12 handles status bar area approx -->
<button class="flex size-10 items-center justify-center rounded-full bg-surface-darker/80 backdrop-blur-md border border-gray-700 text-white hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-white text-lg font-bold leading-tight tracking-tight">En Route</h2>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-yabisso-green animate-pulse"></div>
<span class="text-xs font-medium text-gray-300">Live Status</span>
</div>
</div>
<button class="flex h-10 px-3 items-center justify-center rounded-full bg-surface-darker/80 backdrop-blur-md border border-gray-700 text-white hover:bg-surface-dark transition-colors">
<span class="text-sm font-bold tracking-wide">Help</span>
</button>
</div>
</div>
<!-- SPACER to push bottom sheet down -->
<div class="flex-1 pointer-events-none"></div>
<!-- BOTTOM SHEET (Driver & Ride Info) -->
<div class="relative z-30 w-full bg-surface-dark rounded-t-3xl shadow-[0_-4px_30px_rgba(0,0,0,0.5)] border-t border-gray-800 flex flex-col animate-slide-up pb-8">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="w-12 h-1.5 bg-gray-600 rounded-full opacity-50"></div>
</div>
<!-- Main Content Container -->
<div class="px-5 pt-2 pb-6 flex flex-col gap-6">
<!-- Header: ETA & Status -->
<div class="flex justify-between items-end">
<div>
<p class="text-gray-400 text-sm font-medium mb-1">Arriving in</p>
<h1 class="text-3xl font-extrabold text-white tracking-tight">4 <span class="text-lg font-medium text-gray-400">min</span></h1>
</div>
<div class="text-right">
<span class="inline-flex items-center justify-center px-2.5 py-1 rounded-md bg-primary/20 text-primary text-xs font-bold tracking-wide border border-primary/20">
                            ON TIME
                        </span>
</div>
</div>
<!-- Driver & Car Card -->
<div class="flex flex-row items-center gap-4 bg-surface-darker p-4 rounded-2xl border border-gray-800/50">
<!-- Driver Avatar -->
<div class="relative shrink-0">
<div class="w-14 h-14 rounded-full bg-gray-700 bg-cover bg-center border-2 border-surface-dark" data-alt="Portrait of taxi driver Samuel smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDuAeA-4W4_SMr7SHuEDE07jVtdQ9TgNTa_8iqxaxShAJYaSVTgSDan2UNWu8sp1f9guhXjQv7ugXGDg45PFnEMoPXar1EPV8HE87sGuZFMajleL3RFq309GARKlXJmB_Gk92aaJsS4gu6iqf-GpXbEZ4RxU3DhOEi7RAoCGUFY7-TDhyCE1sb6LquQguw_wZ6UXYzG2AaILkafiAW_q0u_aSQd38POAYEdLRktinclxziVl-YlfqQs6x822mHmjjYCyf7Lci9_");'>
</div>
<div class="absolute -bottom-1 -right-1 bg-surface-darker rounded-full p-0.5 border border-gray-700 flex items-center gap-0.5 px-1.5 shadow-sm">
<span class="material-symbols-outlined text-yabisso-yellow text-[10px] fill-current">star</span>
<span class="text-[10px] font-bold text-white">4.9</span>
</div>
</div>
<!-- Info -->
<div class="flex-1 min-w-0">
<h3 class="text-white text-lg font-bold leading-tight truncate">Samuel O.</h3>
<p class="text-gray-400 text-sm truncate mt-0.5">Toyota Corolla • Silver</p>
<!-- License Plate Badge -->
<div class="mt-2 inline-flex items-center bg-gray-700/50 rounded-md px-2 py-0.5 border border-gray-600/50">
<span class="text-[10px] font-bold text-gray-300 tracking-wider">KGL 832 AC</span>
</div>
</div>
<!-- Car Thumb -->
<div class="w-16 h-12 rounded-lg bg-cover bg-center shrink-0 opacity-90" data-alt="Silver Toyota Corolla side view" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAtS_CwPgg_dl60Iv4TGgvWeWUX-S2Q9qc5lq5pHJGxxFq4JcAy381MHbylb6SA3xZUvrEa5pM0VaB6NiqlLD0J3QmOmCu_sXR9paZuOeWaBKLzbIiW6_g75YqPSQ4WLkClGVo1AeVOgp-WO3AbUHkdPc9z6hfqkPQclomcD6y5kiFwJPHy-6_AyutEoxfgy51AP1ktEW_sM5hJ_ysDic6whRPgjaX6wgVdDqVK9LJ7WPlGswzHvjUjKAhXzN3JTOZE0mLaprsB");'>
</div>
</div>
<!-- Action Grid -->
<div class="grid grid-cols-4 gap-3">
<!-- Call -->
<button class="col-span-1 flex flex-col items-center justify-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-surface-darker border border-gray-700 flex items-center justify-center group-active:scale-95 transition-transform group-active:bg-primary group-active:border-primary group-active:text-white text-primary">
<span class="material-symbols-outlined">call</span>
</div>
<span class="text-[11px] font-semibold text-gray-400">Call</span>
</button>
<!-- Chat -->
<button class="col-span-1 flex flex-col items-center justify-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-surface-darker border border-gray-700 flex items-center justify-center group-active:scale-95 transition-transform group-active:bg-primary group-active:border-primary group-active:text-white text-primary relative">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="absolute top-0 right-0 w-3 h-3 bg-yabisso-red rounded-full border-2 border-surface-darker"></span>
</div>
<span class="text-[11px] font-semibold text-gray-400">Chat</span>
</button>
<!-- Share -->
<button class="col-span-1 flex flex-col items-center justify-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-surface-darker border border-gray-700 flex items-center justify-center group-active:scale-95 transition-transform group-active:bg-primary group-active:border-primary group-active:text-white text-primary">
<span class="material-symbols-outlined">ios_share</span>
</div>
<span class="text-[11px] font-semibold text-gray-400">Share</span>
</button>
<!-- Safety (Extra for Super App feel) -->
<button class="col-span-1 flex flex-col items-center justify-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-surface-darker border border-gray-700 flex items-center justify-center group-active:scale-95 transition-transform group-active:bg-primary group-active:border-primary group-active:text-white text-primary">
<span class="material-symbols-outlined">security</span>
</div>
<span class="text-[11px] font-semibold text-gray-400">Safety</span>
</button>
</div>
<!-- Primary Actions -->
<div class="pt-2">
<button class="w-full flex items-center justify-center h-12 bg-white text-black rounded-xl font-bold text-base hover:bg-gray-100 active:scale-[0.98] transition-all shadow-lg">
                        Cancel Ride
                    </button>
</div>
</div>
</div>
</div>
</body></html>
