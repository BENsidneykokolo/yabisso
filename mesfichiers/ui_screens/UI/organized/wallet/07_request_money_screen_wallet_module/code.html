<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request Money - Yabisso</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec", // Yabisso Blue
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#eab308",
                        "yabisso-green": "#22c55e",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0F172A", // Deep charcoal/slate
                        "surface-dark": "#1E293B",
                        "input-bg": "#334155",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for chips */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Smooth fade for elements */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary selection:text-white overflow-hidden">
<!-- Main Container -->
<div class="relative flex flex-col h-screen w-full max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden">
<!-- Offline Indicator (Visual only) -->
<div class="absolute top-0 right-0 p-2 z-50 pointer-events-none opacity-50">
<!-- Simulated offline status, conceptually -->
</div>
<!-- Header -->
<header class="flex items-center justify-between p-4 pt-6 bg-background-light dark:bg-background-dark z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined text-[28px]">chevron_left</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Request Money</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-900 dark:text-white relative">
<span class="material-symbols-outlined text-[24px]">history</span>
<!-- Notification dot -->
<span class="absolute top-2 right-2 w-2 h-2 bg-yabisso-red rounded-full border-2 border-background-dark"></span>
</button>
</header>
<!-- Tabs -->
<div class="px-4 pb-2">
<div class="flex border-b border-slate-200 dark:border-slate-700">
<button class="flex-1 pb-3 text-sm font-semibold text-primary border-b-[3px] border-primary transition-colors">
                    Enter Details
                </button>
<button class="flex-1 pb-3 text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors border-b-[3px] border-transparent">
                    My QR Code
                </button>
</div>
</div>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24">
<div class="flex flex-col gap-6 p-4 fade-in">
<!-- Amount Section -->
<div class="flex flex-col items-center justify-center pt-4 pb-2">
<label class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2">Total Request Amount</label>
<div class="relative flex items-center justify-center w-full">
<span class="text-3xl font-bold text-slate-400 dark:text-slate-500 mr-2">$</span>
<input class="w-full text-center bg-transparent border-none text-6xl font-extrabold text-slate-900 dark:text-white focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 p-0 leading-none tracking-tight" placeholder="0" type="number"/>
</div>
</div>
<!-- Chips (Quick Amounts) -->
<div class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1">
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-700 dark:text-slate-300 font-medium text-sm hover:bg-primary/20 hover:text-primary hover:border-primary border border-transparent transition-all active:scale-95">
                        $500
                    </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-700 dark:text-slate-300 font-medium text-sm hover:bg-primary/20 hover:text-primary hover:border-primary border border-transparent transition-all active:scale-95">
                        $1,000
                    </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-700 dark:text-slate-300 font-medium text-sm hover:bg-primary/20 hover:text-primary hover:border-primary border border-transparent transition-all active:scale-95">
                        $5,000
                    </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-slate-200 dark:bg-surface-dark text-slate-700 dark:text-slate-300 font-medium text-sm hover:bg-primary/20 hover:text-primary hover:border-primary border border-transparent transition-all active:scale-95">
                        $10,000
                    </button>
</div>
<div class="h-px w-full bg-slate-200 dark:bg-slate-800 my-1"></div>
<!-- Recipient Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Request from</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input class="w-full bg-slate-100 dark:bg-surface-dark border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-12 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 font-medium transition-all" placeholder="Name, Yabisso ID, or Phone" type="text"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center justify-center text-primary hover:text-blue-400 transition-colors">
<span class="material-symbols-outlined">contacts</span>
</button>
</div>
<p class="text-xs text-slate-400 dark:text-slate-500 ml-1">Use the contact picker to find friends quickly.</p>
</div>
<!-- Note Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Note (Optional)</label>
<div class="relative group">
<textarea class="w-full bg-slate-100 dark:bg-surface-dark border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-3 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 font-medium transition-all resize-none" placeholder="What's this for? (e.g. Dinner split)" rows="3"></textarea>
</div>
</div>
<!-- Branding Hints (Subtle) -->
<div class="flex items-center justify-center gap-2 mt-4 opacity-30">
<div class="w-1.5 h-1.5 rounded-full bg-yabisso-blue"></div>
<div class="w-1.5 h-1.5 rounded-full bg-yabisso-red"></div>
<div class="w-1.5 h-1.5 rounded-full bg-yabisso-yellow"></div>
<div class="w-1.5 h-1.5 rounded-full bg-yabisso-green"></div>
</div>
</div>
</main>
<!-- Sticky Footer Action -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent pb-8 pt-10">
<button class="w-full h-14 bg-white text-black font-bold text-lg rounded-xl shadow-lg shadow-white/5 active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-gray-100">
<span>Send Request</span>
<span class="material-symbols-outlined text-[20px] font-bold">arrow_forward</span>
</button>
</div>
</div>
</body></html>
