<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grocery Product Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec37",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102213",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2e1d",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "3xl": "2.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d1b10] dark:text-gray-100 overflow-x-hidden pb-24">
<!-- Hero Image Section -->
<div class="relative w-full h-[45vh] bg-gray-200">
<!-- Image -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Close up of fresh red organic tomatoes with water droplets" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB1WreouwKzH3nBO2PyOQDB43G7lPs-zWdu6MXAaI-3qPkDEEYrOl4arFxlStqfGgUKo_q_w4mdJ50d8jRT1VQY5QXdl7MuTohH0HFDhHg2nYM9QbOMxzv_72OnyKG6rmMzv4zjfaI_Fi79oub30tsCqgDaL5SvflfVCP2phX2FRrGOFHETbou673-3WHvMLq0JL04Mcq4ESTWFfYEu_Bz-vWt_fs4gXNpahG_GEJbsxKLoceslKXUW9oz9nrIHFVkJuTHWT7Ne');">
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/10"></div>
</div>
<!-- Top Navigation Overlay -->
<div class="absolute top-0 left-0 w-full p-4 pt-12 flex justify-between items-center z-10">
<button class="flex items-center justify-center size-12 rounded-full bg-white/20 backdrop-blur-md text-white hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex gap-3">
<button class="flex items-center justify-center size-12 rounded-full bg-white/20 backdrop-blur-md text-white hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-2xl">favorite</span>
</button>
<button class="flex items-center justify-center size-12 rounded-full bg-white/20 backdrop-blur-md text-white hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-2xl">share</span>
</button>
</div>
</div>
</div>
<!-- Main Content Card (Overlapping) -->
<div class="relative -mt-10 rounded-t-3xl bg-background-light dark:bg-background-dark w-full min-h-screen px-5 pt-8 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
<!-- Drag Handle / Visual Cue -->
<div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-6"></div>
<!-- Product Header -->
<div class="flex flex-col gap-2 mb-6">
<div class="flex justify-between items-start">
<h1 class="text-3xl font-bold leading-tight tracking-tight text-[#0d1b10] dark:text-white max-w-[70%]">Fresh Organic Tomatoes</h1>
<div class="flex flex-col items-end">
<span class="text-2xl font-bold text-primary">₦ 850</span>
<span class="text-sm text-gray-500 dark:text-gray-400 font-medium">per kg</span>
</div>
</div>
<!-- Ratings Summary (Small) -->
<div class="flex items-center gap-2 mt-1">
<div class="flex text-yellow-400">
<span class="material-symbols-outlined text-[20px] fill-1">star</span>
<span class="material-symbols-outlined text-[20px] fill-1">star</span>
<span class="material-symbols-outlined text-[20px] fill-1">star</span>
<span class="material-symbols-outlined text-[20px] fill-1">star</span>
<span class="material-symbols-outlined text-[20px] fill-1">star_half</span>
</div>
<span class="text-sm font-medium text-gray-600 dark:text-gray-300">(128 reviews)</span>
<span class="w-1 h-1 rounded-full bg-gray-400 mx-1"></span>
<span class="text-sm font-medium text-primary">In Stock</span>
</div>
</div>
<!-- Seller Card -->
<div class="mb-8 p-4 rounded-2xl bg-white dark:bg-surface-dark shadow-sm border border-gray-100 dark:border-gray-800 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-14 rounded-full bg-gray-200 bg-cover bg-center border-2 border-primary" data-alt="Portrait of smiling African market woman" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-3HqxJezfvmquY7KK6bIddXpKDsUceP2PD9eEJTpz2YlEuQiAxx-Jbetr319JIBDbpRqBx3xiqGMNMxspncHe2cNnY_wdGzTo-QCPgG7Yxw-sfmwwJyv6G3cNlRZyqQ2egZIzXbpJokri6x_DxjDi5E_xTmfhzaEl66MMosJKqIlcziOFW3ywcZJb1Jati_d1OEUK14QJEUcVScYbdNk1oT27sYAbjsCw3K1TXH-ZZcqgpAgxNc5QKTPjTYX1EZdzo2Fo9gru');">
</div>
<div>
<h3 class="font-bold text-lg text-[#0d1b10] dark:text-white">Mama Ngozi's Store</h3>
<div class="flex items-center gap-3 text-sm text-gray-500 dark:text-gray-400">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">location_on</span> 1.2km</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-yellow-500">star</span> 4.8</span>
</div>
</div>
</div>
<button class="size-10 rounded-full bg-green-50 dark:bg-green-900/30 text-primary flex items-center justify-center">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
</div>
<!-- Quantity & Voice Assistant Section -->
<div class="flex items-end justify-between mb-8">
<div class="flex flex-col gap-3">
<label class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Quantity</label>
<div class="flex items-center gap-4 bg-white dark:bg-surface-dark p-2 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-fit">
<button class="size-12 rounded-xl bg-gray-100 dark:bg-gray-700 text-[#0d1b10] dark:text-white flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-xl font-bold w-12 text-center">2</span>
<button class="size-12 rounded-xl bg-primary text-[#0d1b10] flex items-center justify-center hover:bg-[#0fd630] transition-colors shadow-lg shadow-green-200 dark:shadow-none">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Voice Assistant -->
<div class="relative flex flex-col items-center mb-1">
<!-- Tooltip -->
<div class="absolute -top-10 bg-black/80 text-white text-xs px-3 py-1.5 rounded-lg whitespace-nowrap mb-2 animate-bounce">
                    Say "Add 2 kilos"
                    <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-black/80 rotate-45"></div>
</div>
<button class="size-14 rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 border-2 border-orange-200 dark:border-orange-800 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-3xl">mic</span>
</button>
</div>
</div>
<!-- Delivery Options -->
<div class="mb-8">
<label class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3 block">Delivery</label>
<div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
<!-- Active Option -->
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="delivery" type="radio"/>
<div class="min-w-[140px] p-4 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent peer-checked:border-primary peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 transition-all shadow-sm flex flex-col items-center text-center gap-2">
<div class="p-3 rounded-full bg-gray-100 dark:bg-gray-800 peer-checked:bg-white dark:peer-checked:bg-surface-dark text-gray-800 dark:text-gray-200">
<span class="material-symbols-outlined text-2xl">moped</span>
</div>
<span class="font-bold text-sm text-[#0d1b10] dark:text-white">Home Delivery</span>
<span class="text-xs text-primary font-medium">~ 30 mins</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined filled text-xl">check_circle</span>
</div>
</label>
<!-- Inactive Option -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="delivery" type="radio"/>
<div class="min-w-[140px] p-4 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent peer-checked:border-primary peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 transition-all shadow-sm flex flex-col items-center text-center gap-2">
<div class="p-3 rounded-full bg-gray-100 dark:bg-gray-800 peer-checked:bg-white dark:peer-checked:bg-surface-dark text-gray-800 dark:text-gray-200">
<span class="material-symbols-outlined text-2xl">storefront</span>
</div>
<span class="font-bold text-sm text-[#0d1b10] dark:text-white">Pick Up</span>
<span class="text-xs text-gray-400 font-medium">1.2km away</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined filled text-xl">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Payment Options -->
<div class="mb-24">
<label class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3 block">Payment</label>
<div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
<!-- Option 1 -->
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="payment" type="radio"/>
<div class="min-w-[110px] p-3 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent peer-checked:border-primary peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 transition-all shadow-sm flex flex-col items-center text-center gap-2">
<span class="material-symbols-outlined text-3xl text-primary">account_balance_wallet</span>
<span class="font-bold text-xs text-[#0d1b10] dark:text-white">Wallet</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined filled text-lg">check_circle</span>
</div>
</label>
<!-- Option 2 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="payment" type="radio"/>
<div class="min-w-[110px] p-3 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent peer-checked:border-primary peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 transition-all shadow-sm flex flex-col items-center text-center gap-2">
<span class="material-symbols-outlined text-3xl text-gray-600 dark:text-gray-400">payments</span>
<span class="font-bold text-xs text-[#0d1b10] dark:text-white">Cash</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined filled text-lg">check_circle</span>
</div>
</label>
<!-- Option 3 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="payment" type="radio"/>
<div class="min-w-[110px] p-3 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent peer-checked:border-primary peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 transition-all shadow-sm flex flex-col items-center text-center gap-2">
<span class="material-symbols-outlined text-3xl text-gray-600 dark:text-gray-400">qr_code_scanner</span>
<span class="font-bold text-xs text-[#0d1b10] dark:text-white">QR Pay</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined filled text-lg">check_circle</span>
</div>
</label>
</div>
</div>
</div>
<!-- Fixed Bottom Actions & Nav Container -->
<div class="fixed bottom-0 left-0 w-full z-40">
<!-- Add to Cart Floating Panel -->
<div class="px-4 pb-2">
<div class="bg-primary dark:bg-primary rounded-2xl p-4 shadow-xl shadow-green-900/20 flex items-center justify-between mb-2">
<div class="flex flex-col text-[#0d1b10]">
<span class="text-xs uppercase font-bold opacity-80">Total</span>
<span class="text-xl font-bold">₦ 1,700</span>
</div>
<button class="bg-white text-[#0d1b10] px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-gray-50 transition-colors shadow-sm">
<span class="material-symbols-outlined">shopping_cart</span>
                    Add to Cart
                </button>
</div>
</div>
<!-- Bottom Navigation Bar (Integrated) -->
<div class="bg-white dark:bg-surface-dark border-t border-gray-100 dark:border-gray-800 pb-5 pt-3 px-6 flex justify-between items-center text-gray-400">
<div class="flex flex-col items-center gap-1 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-medium">Home</span>
</div>
<div class="flex flex-col items-center gap-1 cursor-pointer text-primary transition-colors">
<span class="material-symbols-outlined text-2xl filled">storefront</span>
<span class="text-[10px] font-medium">Shop</span>
</div>
<!-- Center FAB Placeholder (often used in super apps) -->
<div class="-mt-8">
<div class="size-14 rounded-full bg-[#0d1b10] dark:bg-white text-white dark:text-[#0d1b10] flex items-center justify-center shadow-lg cursor-pointer">
<span class="material-symbols-outlined text-3xl">qr_code_scanner</span>
</div>
</div>
<div class="flex flex-col items-center gap-1 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">receipt_long</span>
<span class="text-[10px] font-medium">Orders</span>
</div>
<div class="flex flex-col items-center gap-1 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">account_circle</span>
<span class="text-[10px] font-medium">Profile</span>
</div>
</div>
</div>
</body></html>
