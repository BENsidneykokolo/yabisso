<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Note - Yabisso</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "yabisso-red": "#EF4444",
                        "yabisso-yellow": "#FBBF24",
                        "yabisso-green": "#22C55E",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary/30 h-screen overflow-hidden flex flex-col">
<!-- Header Navigation -->
<header class="flex items-center justify-between px-4 pt-4 pb-2 z-10 shrink-0 bg-background-light dark:bg-background-dark">
<button class="flex items-center justify-center size-10 rounded-full active:bg-gray-200 dark:active:bg-white/10 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight">New Note</h1>
<div class="size-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-6 pt-2 overflow-y-auto no-scrollbar">
<!-- Title Input -->
<div class="py-4">
<input class="w-full bg-transparent border-none p-0 text-3xl font-bold placeholder:text-gray-400 dark:placeholder:text-gray-600 focus:ring-0 text-slate-900 dark:text-white" placeholder="Title (optional)" type="text"/>
</div>
<!-- Body Text Area -->
<div class="flex-1 pb-4">
<textarea class="w-full h-full bg-transparent border-none p-0 text-lg leading-relaxed placeholder:text-gray-400 dark:placeholder:text-gray-600 focus:ring-0 resize-none text-slate-800 dark:text-slate-200" placeholder="Start typing your thoughts here..."></textarea>
</div>
</main>
<!-- Bottom Actions & Save -->
<footer class="shrink-0 w-full bg-background-light dark:bg-background-dark pt-2 pb-6 px-6">
<!-- Attachment Toolbar -->
<div class="flex items-center gap-3 mb-6 overflow-x-auto no-scrollbar pb-1">
<!-- Voice Attachment (Red Accent) -->
<button class="group flex items-center gap-2.5 bg-white dark:bg-[#1c2936] pl-2.5 pr-4 py-2 rounded-full border border-gray-100 dark:border-white/5 shadow-sm active:scale-95 transition-all whitespace-nowrap">
<div class="flex items-center justify-center size-8 rounded-full bg-red-50 dark:bg-red-500/10 text-yabisso-red">
<span class="material-symbols-outlined" style="font-size: 20px;">mic</span>
</div>
<span class="text-sm font-semibold text-gray-600 dark:text-gray-300">Voice</span>
</button>
<!-- Photo Attachment (Yellow Accent) -->
<button class="group flex items-center gap-2.5 bg-white dark:bg-[#1c2936] pl-2.5 pr-4 py-2 rounded-full border border-gray-100 dark:border-white/5 shadow-sm active:scale-95 transition-all whitespace-nowrap">
<div class="flex items-center justify-center size-8 rounded-full bg-yellow-50 dark:bg-yellow-500/10 text-yabisso-yellow">
<span class="material-symbols-outlined" style="font-size: 20px;">photo_camera</span>
</div>
<span class="text-sm font-semibold text-gray-600 dark:text-gray-300">Photo</span>
</button>
<!-- Gallery Attachment (Blue Accent - Primary) -->
<button class="group flex items-center gap-2.5 bg-white dark:bg-[#1c2936] pl-2.5 pr-4 py-2 rounded-full border border-gray-100 dark:border-white/5 shadow-sm active:scale-95 transition-all whitespace-nowrap">
<div class="flex items-center justify-center size-8 rounded-full bg-blue-50 dark:bg-blue-500/10 text-primary">
<span class="material-symbols-outlined" style="font-size: 20px;">image</span>
</div>
<span class="text-sm font-semibold text-gray-600 dark:text-gray-300">Gallery</span>
</button>
</div>
<!-- Offline Status & Save Action -->
<div class="flex flex-col gap-4">
<!-- Offline Indicator (Green Accent) -->
<div class="flex items-center justify-center gap-1.5 opacity-80">
<span class="material-symbols-outlined text-yabisso-green filled" style="font-size: 18px; font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">Saved offline</span>
</div>
<!-- Save Button -->
<button class="w-full h-14 bg-slate-900 dark:bg-white text-white dark:text-background-dark font-bold text-lg rounded-full shadow-lg shadow-gray-300/50 dark:shadow-none active:scale-[0.98] transition-transform flex items-center justify-center relative overflow-hidden">
<span class="relative z-10">Save Note</span>
<!-- Subtle decorative gradient for "Tech" feel -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent w-1/2 -skew-x-12 translate-x-[-150%] animate-[shimmer_2s_infinite]"></div>
</button>
</div>
</footer>
</body></html>
