<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso - Boarding Pass</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "card-dark": "#1c2936",
                        "accent-red": "#ef4444",
                        "accent-yellow": "#eab308",
                        "accent-green": "#22c55e",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .ticket-cutout::before, .ticket-cutout::after {
            content: '';
            position: absolute;
            height: 24px;
            width: 24px;
            background-color: #101922; /* Matches page background */
            border-radius: 50%;
            top: -12px;
            z-index: 10;
        }
        .ticket-cutout::before { left: -12px; }
        .ticket-cutout::after { right: -12px; }
        
        .dashed-line {
            background-image: linear-gradient(to right, #334155 50%, rgba(255,255,255,0) 0%);
            background-position: bottom;
            background-size: 16px 1px;
            background-repeat: repeat-x;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary/30">
<div class="relative flex h-full min-h-screen w-full flex-col pb-24 overflow-x-hidden">
<!-- Top App Bar -->
<div class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Your Boarding Pass</h2>
</div>
<!-- Main Content -->
<div class="flex-1 px-4 py-2 w-full max-w-md mx-auto flex flex-col items-center">
<!-- Ticket Container -->
<div class="w-full bg-card-dark rounded-2xl overflow-hidden shadow-2xl shadow-black/40 mt-2 relative">
<!-- Brand Stripe (African Vibe) -->
<div class="h-1.5 w-full flex">
<div class="flex-1 bg-accent-green"></div>
<div class="flex-1 bg-accent-yellow"></div>
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-accent-red"></div>
</div>
<!-- QR Code Section (Bright for scanning) -->
<div class="bg-white p-8 pb-10 flex flex-col items-center justify-center relative">
<div class="p-3 border-2 border-slate-900 rounded-xl">
<!-- QR Code Placeholder -->
<img alt="QR Code for boarding" class="w-48 h-48 rendering-pixelated" data-alt="Black and white QR code for ticket scanning" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_7EzxPvqlJVSat0rT9kHW-mWGHuob8QuR0_RwS6tcrGyHbUBQ6SuYjIRtK-19OgnZOKY2VVHyM8-WZ7hc-DK0VSwTZCtgJ75u5o403yifjoSu8eFmB-FzU1UABBichGPPJpEL12dRpd3pFL9_kz0FrKKcJh5jo5f_h6sIG4EgsAjQNqdPfevqpAUSvwITuuc7uFu0_hqjZ_IGhLoJ9ZB12_EC1QizuiarmFxxqTRiUSSJbQRO5y_3m3qSyAZL-LrM_0xk_Qd0"/>
</div>
<p class="text-slate-500 text-sm font-medium mt-4 flex items-center gap-1">
<span class="material-symbols-outlined text-lg">center_focus_strong</span>
                        Scan at gate D4
                    </p>
</div>
<!-- Divider with Cutouts -->
<div class="relative h-px w-full ticket-cutout">
<div class="absolute inset-0 top-[-1px] h-[2px] w-full dashed-line"></div>
</div>
<!-- Ticket Details Section -->
<div class="p-5 pt-6 bg-card-dark">
<!-- Route -->
<div class="flex flex-col items-center justify-center mb-8">
<div class="flex items-center gap-4">
<h1 class="text-3xl font-bold text-white tracking-tight">LOS</h1>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary text-2xl rotate-90">flight</span>
<span class="text-[10px] uppercase font-bold text-slate-500 tracking-wider">2h 45m</span>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight">ACC</h1>
</div>
<p class="text-slate-400 text-sm mt-1">Lagos to Accra</p>
</div>
<!-- Key Stats Grid (Time, Seat, Gate) -->
<div class="grid grid-cols-3 gap-3 mb-6">
<div class="flex flex-col gap-1 rounded-xl bg-slate-800/50 p-3 items-center text-center border border-slate-700/50">
<p class="text-white text-xl font-bold leading-tight">14:30</p>
<p class="text-slate-400 text-xs font-medium uppercase tracking-wide">Boarding</p>
</div>
<div class="flex flex-col gap-1 rounded-xl bg-slate-800/50 p-3 items-center text-center border border-slate-700/50">
<p class="text-white text-xl font-bold leading-tight">12A</p>
<p class="text-slate-400 text-xs font-medium uppercase tracking-wide">Seat</p>
</div>
<div class="flex flex-col gap-1 rounded-xl bg-slate-800/50 p-3 items-center text-center border border-slate-700/50">
<p class="text-white text-xl font-bold leading-tight">D4</p>
<p class="text-slate-400 text-xs font-medium uppercase tracking-wide">Gate</p>
</div>
</div>
<!-- Detailed Info List -->
<div class="grid grid-cols-2 gap-y-5 gap-x-4 border-t border-slate-700/50 pt-5">
<div class="flex flex-col gap-1">
<p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Passenger</p>
<p class="text-white text-sm font-semibold truncate">Kwame Adebayo</p>
</div>
<div class="flex flex-col gap-1 text-right">
<p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Date</p>
<p class="text-white text-sm font-semibold">12 Nov 2023</p>
</div>
<div class="flex flex-col gap-1">
<p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Class</p>
<p class="text-white text-sm font-semibold">Economy</p>
</div>
<div class="flex flex-col gap-1 text-right">
<p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Reference</p>
<p class="text-white text-sm font-mono tracking-wide">YB-8829X</p>
</div>
</div>
<!-- Status Chips -->
<div class="mt-6 flex gap-2 flex-wrap justify-center">
<div class="inline-flex items-center gap-1.5 rounded-full bg-slate-800/80 border border-slate-700 px-3 py-1.5">
<span class="material-symbols-outlined text-accent-green text-sm">check_circle</span>
<span class="text-slate-300 text-xs font-medium">Offline Ready</span>
</div>
<div class="inline-flex items-center gap-1.5 rounded-full bg-slate-800/80 border border-slate-700 px-3 py-1.5">
<span class="material-symbols-outlined text-primary text-sm">verified_user</span>
<span class="text-slate-300 text-xs font-medium">Confirmed</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-6 flex w-full gap-3">
<button class="flex-1 h-12 flex items-center justify-center gap-2 rounded-xl bg-slate-800 text-white font-medium hover:bg-slate-700 transition active:scale-95">
<span class="material-symbols-outlined text-[20px]">ios_share</span>
                    Share
                </button>
<button class="flex-1 h-12 flex items-center justify-center gap-2 rounded-xl bg-slate-800 text-white font-medium hover:bg-slate-700 transition active:scale-95">
<span class="material-symbols-outlined text-[20px]">wallet</span>
                    Wallet
                </button>
</div>
</div>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 w-full bg-card-dark border-t border-slate-800 pb-safe pt-2 px-2 z-40">
<div class="flex justify-around items-center h-16 max-w-md mx-auto">
<button class="flex flex-col items-center justify-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">home</span>
<span class="text-[10px] font-medium text-slate-500 group-hover:text-primary transition-colors">Home</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">receipt_long</span>
<span class="text-[10px] font-medium text-slate-500 group-hover:text-primary transition-colors">Orders</span>
</button>
<!-- Active Transport Tab -->
<button class="relative flex flex-col items-center justify-center gap-1 w-16 group -mt-6">
<div class="size-14 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/30 border-4 border-background-dark">
<span class="material-symbols-outlined text-white">confirmation_number</span>
</div>
<span class="text-[10px] font-bold text-white">Tickets</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">account_balance_wallet</span>
<span class="text-[10px] font-medium text-slate-500 group-hover:text-primary transition-colors">Wallet</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">person</span>
<span class="text-[10px] font-medium text-slate-500 group-hover:text-primary transition-colors">Profile</span>
</button>
</div>
</div>
</div>
</body></html>
