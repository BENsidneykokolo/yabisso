<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Transport Search</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Noto+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#eab308",
                        "yabisso-green": "#22c55e",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#1c2630",
                        "input-dark": "#23303d",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-tab .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary/30">
<div class="relative flex h-full min-h-screen w-full max-w-md mx-auto flex-col overflow-hidden shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Background Decoration (Abstract African Pattern Vibe) -->
<div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-[#1c2936] to-transparent pointer-events-none z-0"></div>
<!-- Header -->
<div class="relative z-10 flex items-center p-4 pt-12 pb-2 justify-between">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Find Transport</h2>
<!-- Offline Indicator -->
<div class="absolute right-4 top-14 text-yabisso-yellow animate-pulse" title="Offline Mode Active">
<span class="material-symbols-outlined text-[20px]">wifi_off</span>
</div>
</div>
<!-- Scrollable Content Area -->
<div class="relative z-10 flex-1 overflow-y-auto pb-24 px-4 scrollbar-hide">
<!-- Transport Mode Tabs -->
<div class="mt-4 mb-6">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-200 dark:bg-surface-dark p-1">
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 dark:text-slate-400 font-medium transition-all hover:text-slate-900 dark:hover:text-white has-[:checked]:bg-white dark:has-[:checked]:bg-input-dark has-[:checked]:text-primary has-[:checked]:shadow-sm">
<span class="material-symbols-outlined mr-2 text-[20px] group-has-[:checked]:fill-1">flight</span>
<span class="text-sm truncate">Flights</span>
<input checked="" class="peer invisible absolute w-0" name="transport-mode" type="radio" value="Flights"/>
</label>
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 dark:text-slate-400 font-medium transition-all hover:text-slate-900 dark:hover:text-white has-[:checked]:bg-white dark:has-[:checked]:bg-input-dark has-[:checked]:text-primary has-[:checked]:shadow-sm">
<span class="material-symbols-outlined mr-2 text-[20px] group-has-[:checked]:fill-1">directions_bus</span>
<span class="text-sm truncate">Bus</span>
<input class="peer invisible absolute w-0" name="transport-mode" type="radio" value="Bus"/>
</label>
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 dark:text-slate-400 font-medium transition-all hover:text-slate-900 dark:hover:text-white has-[:checked]:bg-white dark:has-[:checked]:bg-input-dark has-[:checked]:text-primary has-[:checked]:shadow-sm">
<span class="material-symbols-outlined mr-2 text-[20px] group-has-[:checked]:fill-1">train</span>
<span class="text-sm truncate">Train</span>
<input class="peer invisible absolute w-0" name="transport-mode" type="radio" value="Train"/>
</label>
</div>
</div>
<!-- Trip Type Radio -->
<div class="flex gap-4 mb-6">
<label class="group flex items-center gap-2 cursor-pointer">
<div class="relative flex items-center justify-center w-5 h-5 rounded-full border-2 border-slate-400 dark:border-slate-500 group-hover:border-primary transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary">
<input checked="" class="invisible absolute" name="trip-type" type="radio"/>
<div class="w-2 h-2 bg-white rounded-full opacity-0 group-has-[:checked]:opacity-100 transition-opacity"></div>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">One Way</span>
</label>
<label class="group flex items-center gap-2 cursor-pointer">
<div class="relative flex items-center justify-center w-5 h-5 rounded-full border-2 border-slate-400 dark:border-slate-500 group-hover:border-primary transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary">
<input class="invisible absolute" name="trip-type" type="radio"/>
<div class="w-2 h-2 bg-white rounded-full opacity-0 group-has-[:checked]:opacity-100 transition-opacity"></div>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Round Trip</span>
</label>
</div>
<!-- Main Input Fields Container -->
<div class="flex flex-col gap-4">
<!-- Route Inputs -->
<div class="relative flex flex-col gap-3">
<!-- From -->
<div class="group relative bg-white dark:bg-surface-dark rounded-2xl p-4 border border-slate-200 dark:border-slate-700 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">From</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500">flight_takeoff</span>
<input class="w-full bg-transparent border-none p-0 text-slate-900 dark:text-white text-lg font-semibold focus:ring-0 placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Select Departure" type="text" value="Lagos, Nigeria"/>
<span class="text-xs font-bold text-slate-400 bg-slate-100 dark:bg-input-dark px-2 py-1 rounded">LOS</span>
</div>
</div>
<!-- Swap Button -->
<button class="absolute top-1/2 left-[80%] -translate-x-1/2 -translate-y-1/2 z-10 bg-white dark:bg-input-dark border border-slate-200 dark:border-slate-600 rounded-full p-2 shadow-lg hover:rotate-180 transition-transform duration-300 group">
<span class="material-symbols-outlined text-primary text-[20px]">swap_vert</span>
</button>
<!-- To -->
<div class="group relative bg-white dark:bg-surface-dark rounded-2xl p-4 border border-slate-200 dark:border-slate-700 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">To</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500">flight_land</span>
<input class="w-full bg-transparent border-none p-0 text-slate-900 dark:text-white text-lg font-semibold focus:ring-0 placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Select Arrival" type="text" value="Nairobi, Kenya"/>
<span class="text-xs font-bold text-slate-400 bg-slate-100 dark:bg-input-dark px-2 py-1 rounded">NBO</span>
</div>
</div>
</div>
<!-- Date & Travelers Row -->
<div class="flex gap-3">
<!-- Date -->
<div class="flex-1 bg-white dark:bg-surface-dark rounded-2xl p-4 border border-slate-200 dark:border-slate-700 cursor-pointer hover:border-primary/50 transition-colors">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Departure</label>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">calendar_month</span>
<div class="flex flex-col">
<span class="text-sm font-bold text-slate-900 dark:text-white leading-tight">12 Oct</span>
<span class="text-[10px] text-slate-500 font-medium">Wednesday</span>
</div>
</div>
</div>
<!-- Travelers -->
<div class="flex-1 bg-white dark:bg-surface-dark rounded-2xl p-4 border border-slate-200 dark:border-slate-700 cursor-pointer hover:border-primary/50 transition-colors">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Travelers</label>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">group</span>
<div class="flex flex-col">
<span class="text-sm font-bold text-slate-900 dark:text-white leading-tight">2 Adults</span>
<span class="text-[10px] text-slate-500 font-medium">Economy</span>
</div>
</div>
</div>
</div>
</div>
<!-- Recent Searches -->
<div class="mt-8">
<div class="flex items-center justify-between mb-3 px-1">
<h3 class="text-sm font-semibold text-slate-900 dark:text-white">Recent Searches</h3>
<button class="text-xs text-primary font-medium hover:underline">Clear</button>
</div>
<div class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide -mx-4 px-4">
<!-- Recent Item 1 -->
<div class="flex-none w-40 bg-white dark:bg-surface-dark rounded-xl p-3 border border-slate-200 dark:border-slate-700">
<div class="flex items-center justify-between text-xs text-slate-500 mb-2">
<span>LOS</span>
<span class="material-symbols-outlined text-[14px]">arrow_forward</span>
<span>LHR</span>
</div>
<div class="text-xs font-medium text-slate-900 dark:text-white">1 Adult • Economy</div>
<div class="text-[10px] text-slate-400 mt-1">24 Sep 2023</div>
</div>
<!-- Recent Item 2 -->
<div class="flex-none w-40 bg-white dark:bg-surface-dark rounded-xl p-3 border border-slate-200 dark:border-slate-700">
<div class="flex items-center justify-between text-xs text-slate-500 mb-2">
<span>ACC</span>
<span class="material-symbols-outlined text-[14px]">arrow_forward</span>
<span>DXB</span>
</div>
<div class="text-xs font-medium text-slate-900 dark:text-white">2 Adults • Business</div>
<div class="text-[10px] text-slate-400 mt-1">10 Nov 2023</div>
</div>
<!-- Recent Item 3 -->
<div class="flex-none w-40 bg-white dark:bg-surface-dark rounded-xl p-3 border border-slate-200 dark:border-slate-700 opacity-60">
<div class="flex items-center justify-between text-xs text-slate-500 mb-2">
<span>JNB</span>
<span class="material-symbols-outlined text-[14px]">arrow_forward</span>
<span>CPT</span>
</div>
<div class="text-xs font-medium text-slate-900 dark:text-white">1 Adult • Economy</div>
<div class="text-[10px] text-slate-400 mt-1">02 Dec 2023</div>
</div>
</div>
</div>
<div class="h-20"></div> <!-- Spacer for fixed button -->
</div>
<!-- Footer / Action Button -->
<div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent z-20 pb-8">
<button class="w-full bg-white text-slate-900 h-14 rounded-xl text-lg font-bold shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:bg-slate-100 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">search</span>
                Search Flights
            </button>
</div>
</div>
</body></html>
