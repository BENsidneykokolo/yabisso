<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Method Selector</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#1c2936",
                        "accent-green": "#00c853",
                        "accent-yellow": "#ffd600",
                        "accent-red": "#ff1744",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #101922; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3748; 
            border-radius: 2px;
        }
        /* Radio button custom styles */
        .payment-radio:checked + div {
            border-color: #137fec;
            background-color: rgba(19, 127, 236, 0.05);
        }
        .payment-radio:checked + div .radio-indicator {
            background-color: #137fec;
            border-color: #137fec;
        }
        .payment-radio:checked + div .radio-indicator::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Bottom Sheet Handle Area -->
<div class="flex-none pt-2 pb-4 bg-background-light dark:bg-background-dark z-10">
<div class="flex flex-col items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-gray-300 dark:bg-gray-700 mb-6"></div>
<div class="flex w-full items-center justify-between px-6">
<h3 class="text-gray-900 dark:text-white tracking-tight text-2xl font-bold leading-tight">Choose Payment</h3>
<button class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">
<span class="material-symbols-outlined font-bold">close</span>
</button>
</div>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-4 pb-32">
<!-- Section Label -->
<p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-4 px-2 uppercase tracking-wider">Available Methods</p>
<form class="space-y-3">
<!-- Option 1: Yabisso Wallet -->
<label class="relative block cursor-pointer group">
<input checked="" class="peer sr-only payment-radio" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 bg-white dark:bg-surface-dark px-4 py-4 rounded-xl border-2 border-transparent transition-all hover:bg-gray-50 dark:hover:bg-[#253341]">
<!-- Icon -->
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary shrink-0 size-12">
<span class="material-symbols-outlined text-[28px]">account_balance_wallet</span>
</div>
<!-- Content -->
<div class="flex flex-col justify-center flex-1">
<div class="flex items-center gap-2">
<p class="text-gray-900 dark:text-white text-base font-bold leading-normal">Yabisso Wallet</p>
<span class="bg-primary/20 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full">PREFERRED</span>
</div>
<p class="text-gray-500 dark:text-[#92adc9] text-sm font-normal leading-normal">Balance: $840.50</p>
</div>
<!-- Radio UI -->
<div class="shrink-0">
<div class="radio-indicator flex size-6 items-center justify-center rounded-full border-2 border-gray-300 dark:border-gray-600 transition-colors"></div>
</div>
</div>
</label>
<!-- Option 2: Credit Card -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only payment-radio" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 bg-white dark:bg-surface-dark px-4 py-4 rounded-xl border-2 border-transparent transition-all hover:bg-gray-50 dark:hover:bg-[#253341]">
<!-- Icon -->
<div class="flex items-center justify-center rounded-lg bg-accent-red/10 text-accent-red shrink-0 size-12 relative overflow-hidden">
<!-- Abstract pattern for card -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, currentColor 1px, transparent 0); background-size: 8px 8px;"></div>
<span class="material-symbols-outlined text-[28px] relative z-10">credit_card</span>
</div>
<!-- Content -->
<div class="flex flex-col justify-center flex-1">
<p class="text-gray-900 dark:text-white text-base font-bold leading-normal">Mastercard **** 4242</p>
<p class="text-gray-500 dark:text-[#92adc9] text-sm font-normal leading-normal">Expires 12/25</p>
</div>
<!-- Radio UI -->
<div class="shrink-0">
<div class="radio-indicator flex size-6 items-center justify-center rounded-full border-2 border-gray-300 dark:border-gray-600 transition-colors"></div>
</div>
</div>
</label>
<!-- Option 3: Mobile Money -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only payment-radio" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 bg-white dark:bg-surface-dark px-4 py-4 rounded-xl border-2 border-transparent transition-all hover:bg-gray-50 dark:hover:bg-[#253341]">
<!-- Icon -->
<div class="flex items-center justify-center rounded-lg bg-accent-green/10 text-accent-green shrink-0 size-12">
<span class="material-symbols-outlined text-[28px]">smartphone</span>
</div>
<!-- Content -->
<div class="flex flex-col justify-center flex-1">
<p class="text-gray-900 dark:text-white text-base font-bold leading-normal">M-Pesa</p>
<p class="text-gray-500 dark:text-[#92adc9] text-sm font-normal leading-normal">+254 712 *** ***</p>
</div>
<!-- Radio UI -->
<div class="shrink-0">
<div class="radio-indicator flex size-6 items-center justify-center rounded-full border-2 border-gray-300 dark:border-gray-600 transition-colors"></div>
</div>
</div>
</label>
<!-- Option 4: SMS Payment (Offline) -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only payment-radio" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 bg-white dark:bg-surface-dark px-4 py-4 rounded-xl border-2 border-transparent transition-all hover:bg-gray-50 dark:hover:bg-[#253341]">
<!-- Icon -->
<div class="flex items-center justify-center rounded-lg bg-accent-yellow/10 text-accent-yellow shrink-0 size-12">
<span class="material-symbols-outlined text-[28px]">sms</span>
</div>
<!-- Content -->
<div class="flex flex-col justify-center flex-1">
<div class="flex items-center gap-2">
<p class="text-gray-900 dark:text-white text-base font-bold leading-normal">SMS Payment</p>
<div class="flex items-center gap-1 bg-accent-yellow/10 border border-accent-yellow/20 px-1.5 py-0.5 rounded text-[10px] font-bold text-accent-yellow">
<span class="material-symbols-outlined text-[10px]">wifi_off</span>
                                    OFFLINE
                                </div>
</div>
<p class="text-gray-500 dark:text-[#92adc9] text-sm font-normal leading-normal">Pay via carrier billing</p>
</div>
<!-- Radio UI -->
<div class="shrink-0">
<div class="radio-indicator flex size-6 items-center justify-center rounded-full border-2 border-gray-300 dark:border-gray-600 transition-colors"></div>
</div>
</div>
</label>
</form>
<!-- Add New Method -->
<button class="w-full mt-6 flex items-center justify-center gap-2 py-4 rounded-xl border border-dashed border-gray-300 dark:border-gray-700 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-[#253341]/50 hover:border-primary/50 hover:text-primary transition-all group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">add_circle</span>
<span class="font-medium">Add New Payment Method</span>
</button>
<div class="h-6"></div>
</div>
<!-- Sticky Footer CTA -->
<div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent pt-8">
<button class="w-full bg-primary hover:bg-blue-600 active:bg-blue-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all flex items-center justify-between px-6">
<span>Confirm Payment</span>
<span class="bg-white/20 px-2 py-1 rounded text-sm font-medium">$25.00</span>
</button>
</div>
</div>
</body></html>
