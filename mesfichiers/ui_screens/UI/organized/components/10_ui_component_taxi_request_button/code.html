<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Taxi Request UI</title>
<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
              "surface-dark": "#1c2630",
              "surface-highlight": "#283543",
              "success": "#22c55e", 
              "warning": "#eab308",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            boxShadow: {
                "glow": "0 0 20px -5px rgba(19, 127, 236, 0.5)",
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: "Space Grotesk", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Mobile Screen Container -->
<div class="relative w-full max-w-md bg-background-dark h-[800px] overflow-hidden rounded-[40px] shadow-2xl border border-surface-highlight flex flex-col">
<!-- Header / Map Area (Background Context) -->
<div class="absolute inset-0 z-0 h-3/4 w-full bg-cover bg-center opacity-60" data-alt="Dark abstract map interface with blue location markers and street grid" data-location="Lagos, Nigeria" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA3EJ-EYGtk_vk0OL1dTgF0GzBimCPfc4wDxK3Udjeg46wpBG71p1uRhcGg4ESA8P6KebGgDAtDJ3MHQjt9MVvvZ7JvlpC-rB_WpJzX-ZaPxRhex8WLLetfBTsR6XSMvvAIwKyALZf97-y6iZIudvrLsqmFHoPLj7WiWs9lfWYKj7tJwSePhb8RquK_OGJB6AmGO4CwIYaY7kJFrQB2sRH29Ymju2vElVTNYTM6e-QYCANY8UUIzvKdBLWUGID9RGKDTnPpLEW0');">
<div class="absolute inset-0 bg-gradient-to-b from-[#101922]/80 via-transparent to-[#101922]"></div>
</div>
<!-- Top Bar (Context) -->
<div class="relative z-10 flex justify-between items-center p-6 pt-12">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-dark/80 backdrop-blur-md text-white shadow-lg border border-white/5">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="bg-surface-dark/80 backdrop-blur-md px-4 py-2 rounded-full border border-white/5">
<span class="text-white text-sm font-medium">Victoria Island, Lagos</span>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-dark/80 backdrop-blur-md text-white shadow-lg border border-white/5">
<span class="material-symbols-outlined">person</span>
</button>
</div>
<!-- Main Content Area (Bottom Sheet) -->
<div class="mt-auto relative z-10 bg-surface-dark rounded-t-[32px] shadow-[0_-8px_30px_rgba(0,0,0,0.4)] border-t border-white/5 pb-8">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 rounded-full bg-white/20"></div>
</div>
<!-- Vehicle Selection Chips -->
<div class="overflow-x-auto pb-4 pt-2 no-scrollbar">
<div class="flex gap-3 px-6 min-w-max">
<!-- Active State -->
<button class="group flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary pl-3 pr-5 shadow-glow transition-all active:scale-95">
<span class="material-symbols-outlined filled text-white text-[20px]">local_taxi</span>
<p class="text-white text-sm font-bold leading-normal">Standard</p>
</button>
<!-- Inactive State -->
<button class="group flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-surface-highlight border border-white/5 pl-3 pr-5 transition-all active:scale-95 hover:bg-white/10">
<span class="material-symbols-outlined text-gray-400 text-[20px]">diamond</span>
<p class="text-gray-300 text-sm font-medium leading-normal">Premium</p>
</button>
<!-- Inactive State -->
<button class="group flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-surface-highlight border border-white/5 pl-3 pr-5 transition-all active:scale-95 hover:bg-white/10">
<span class="material-symbols-outlined text-gray-400 text-[20px]">two_wheeler</span>
<p class="text-gray-300 text-sm font-medium leading-normal">Moto</p>
</button>
</div>
</div>
<!-- Selected Ride Details (ListItem) -->
<div class="px-4">
<div class="flex items-center gap-4 bg-background-dark rounded-2xl p-4 border border-white/5 shadow-inner">
<div class="flex items-center gap-4 flex-1">
<div class="flex items-center justify-center rounded-xl bg-primary/20 shrink-0 h-12 w-12 text-primary">
<span class="material-symbols-outlined filled text-[24px]">local_taxi</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-white text-base font-bold leading-tight">Toyota Corolla</p>
<div class="flex items-center gap-1.5 mt-0.5">
<span class="text-emerald-400 text-xs font-medium flex items-center gap-0.5">
<span class="material-symbols-outlined text-[14px]">bolt</span>
                                    2 min
                                </span>
<span class="text-white/20 text-xs">•</span>
<span class="text-[#92adc9] text-sm font-normal">₦1,200 - ₦1,500</span>
</div>
</div>
</div>
<div class="shrink-0 flex flex-col items-end gap-1">
<span class="text-white/40 text-xs font-medium">Est. Price</span>
<span class="text-white text-lg font-bold">₦1,350</span>
</div>
</div>
</div>
<!-- Meta Text / Offline Warning -->
<div class="px-6 py-4">
<div class="flex items-center justify-center gap-2 bg-yellow-500/10 border border-yellow-500/20 rounded-lg p-2">
<span class="material-symbols-outlined text-yellow-500 text-[18px]">wifi_off</span>
<p class="text-yellow-500 text-xs font-medium">Offline Mode: SMS Fallback Active</p>
</div>
</div>
<!-- Primary Action Button -->
<div class="px-6 pb-2">
<button class="relative w-full group overflow-hidden rounded-full bg-primary h-14 flex items-center justify-between px-2 shadow-glow transition-transform active:scale-[0.98]">
<!-- Button Icon Wrapper -->
<div class="absolute left-2 top-2 bottom-2 aspect-square rounded-full bg-white/20 flex items-center justify-center group-hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">send</span>
</div>
<!-- Button Label -->
<div class="flex-1 text-center">
<span class="text-white text-lg font-bold tracking-wide">Request Taxi</span>
</div>
<!-- Optional Right Icon or Spacer for balance -->
<div class="w-10"></div>
<!-- Shine Effect Overlay -->
<div class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent z-10"></div>
</button>
<!-- Helper text under button -->
<p class="text-center text-white/30 text-[10px] mt-3 uppercase tracking-widest font-medium">Secured by Yabisso</p>
</div>
</div>
</div>
<!-- Animation Keyframes -->
<style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>
</body></html>
