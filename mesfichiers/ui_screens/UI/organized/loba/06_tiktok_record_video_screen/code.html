<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Record Video</title>
<!-- Fonts and Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#eab308",
                        "yabisso-green": "#22c55e",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    spacing: {
                        'safe-top': 'env(safe-area-inset-top)',
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Pulse animation for recording state */
        @keyframes record-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .animate-record-pulse {
            animation: record-pulse 2s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white h-screen w-screen overflow-hidden select-none">
<div class="relative h-full w-full flex flex-col group/design-root">
<!-- 1. Camera Viewfinder Background -->
<!-- Using a placeholder image to simulate the live camera feed -->
<div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat bg-[#111a22]" data-alt="Live camera viewfinder showing a blurred urban street scene with vibrant lights" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCJ1jPjQc0navX4Agb9HCplTY31-_AIi58tsPW2oAvdu7zaqY7OlfG1IKzQM0cuVXCvkbXwPyuEbGyBAc5iGiekoDsaD6dcf5uIXFTgmfWR8qoTqT4J8g1JF8DXE9vqIAsxjF7V90z3vIz047VnofIO7UgtauG5p-Ay6NpWWQm9zRygm4porl0tBbilKiAWlHgykzqLsRlZZ188w613xXHrSre9sAgvwqu8YV5MQBDmQmZww5WizZRQaAKCDiPlXNvdg_s965g6");'>
</div>
<!-- 2. Overlay Gradients for readability -->
<div class="absolute inset-0 z-10 bg-gradient-to-b from-black/60 via-transparent to-black/70 pointer-events-none"></div>
<!-- 3. Main UI Layer -->
<div class="relative z-20 flex flex-col h-full justify-between pt-safe-top pb-safe-bottom">
<!-- TOP BAR AREA -->
<div class="flex flex-col w-full px-4 pt-4 gap-4">
<!-- Recording Progress Bar -->
<!-- Multi-colored segments to reflect Yabisso branding -->
<div class="w-full flex gap-1">
<div class="h-1.5 flex-1 bg-white/30 rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3 rounded-full"></div>
</div>
<!-- Empty segments indicating potential future clips -->
<div class="h-1.5 flex-1 bg-white/20 rounded-full"></div>
<div class="h-1.5 flex-1 bg-white/20 rounded-full"></div>
</div>
<!-- Header Controls -->
<div class="flex items-start justify-between mt-2">
<!-- Close Button -->
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[28px] drop-shadow-md text-white">close</span>
</button>
<!-- Add Sound Button -->
<button class="flex items-center gap-2 bg-black/40 backdrop-blur-md border border-white/10 px-4 py-2 rounded-full cursor-pointer active:scale-95 transition-transform max-w-[160px]">
<span class="material-symbols-outlined text-[20px] text-white">music_note</span>
<div class="flex flex-col items-start overflow-hidden">
<span class="text-xs font-bold whitespace-nowrap text-white truncate w-full">Afrobeats Top 50</span>
<span class="text-[10px] text-white/80 leading-none">Tap to change</span>
</div>
</button>
<!-- Ghost Spacer for alignment -->
<div class="w-10"></div>
</div>
</div>
<!-- MIDDLE AREA (Sidebar Tools) -->
<div class="flex-1 relative w-full">
<!-- Right Sidebar Toolbar -->
<div class="absolute right-4 top-2 flex flex-col gap-5 items-center">
<!-- Flip Camera -->
<button class="flex flex-col items-center gap-1 group">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-black/20 backdrop-blur-sm border border-white/5 shadow-lg group-active:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-[24px]">flip_camera_ios</span>
</div>
<span class="text-[10px] font-semibold drop-shadow text-white">Flip</span>
</button>
<!-- Flash Toggle -->
<button class="flex flex-col items-center gap-1 group">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-black/20 backdrop-blur-sm border border-white/5 shadow-lg group-active:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-[24px]">flash_off</span>
</div>
<span class="text-[10px] font-semibold drop-shadow text-white">Flash</span>
</button>
<!-- Speed Control -->
<button class="flex flex-col items-center gap-1 group">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-black/20 backdrop-blur-sm border border-white/5 shadow-lg group-active:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-[24px]">speed</span>
</div>
<span class="text-[10px] font-semibold drop-shadow text-white">Speed</span>
</button>
<!-- Filters / Beauty -->
<button class="flex flex-col items-center gap-1 group">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-black/20 backdrop-blur-sm border border-white/5 shadow-lg group-active:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-[24px]">face_retouching_natural</span>
</div>
<span class="text-[10px] font-semibold drop-shadow text-white">Beauty</span>
</button>
<!-- Timer -->
<button class="flex flex-col items-center gap-1 group">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-black/20 backdrop-blur-sm border border-white/5 shadow-lg group-active:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-[24px]">timer</span>
</div>
<span class="text-[10px] font-semibold drop-shadow text-white">Timer</span>
</button>
</div>
</div>
<!-- BOTTOM CONTROL AREA -->
<div class="flex flex-col w-full px-6 pb-8 gap-6 bg-gradient-to-t from-black/80 to-transparent pt-10">
<!-- Mode Selector -->
<div class="flex justify-center items-center gap-6 overflow-x-auto no-scrollbar mask-gradient">
<button class="text-sm font-semibold text-white/50 hover:text-white transition-colors whitespace-nowrap">Photo</button>
<button class="text-sm font-bold text-white bg-white/20 px-4 py-1.5 rounded-full backdrop-blur-md shadow-lg border border-white/10 whitespace-nowrap">15s Video</button>
<button class="text-sm font-semibold text-white/50 hover:text-white transition-colors whitespace-nowrap">60s Video</button>
<button class="text-sm font-semibold text-white/50 hover:text-white transition-colors whitespace-nowrap">Templates</button>
</div>
<!-- Main Action Row -->
<div class="flex items-center justify-between mt-2">
<!-- Left: Effects -->
<div class="flex flex-1 justify-start">
<button class="flex flex-col items-center gap-1.5 group">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-600 border-2 border-white/20 flex items-center justify-center overflow-hidden shadow-lg group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white text-xl">auto_fix</span>
</div>
<span class="text-[11px] font-semibold text-white/90 drop-shadow-md">Effects</span>
</button>
</div>
<!-- Center: Shutter Button -->
<div class="flex justify-center">
<button class="relative w-[84px] h-[84px] rounded-full border-[5px] border-white/30 flex items-center justify-center group transition-all duration-300">
<!-- Outer active ring (hidden by default, shown on active) -->
<div class="absolute inset-0 rounded-full border-[4px] border-primary opacity-0 scale-110 group-active:opacity-100 group-active:scale-100 transition-all duration-300"></div>
<!-- Inner Button -->
<div class="w-[68px] h-[68px] bg-white rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,255,255,0.3)] group-active:scale-90 group-active:bg-yabisso-red transition-all duration-200">
<!-- Inner Red dot for 'recording' hint -->
<div class="w-16 h-16 rounded-full bg-white group-active:bg-yabisso-red transition-colors"></div>
</div>
</button>
</div>
<!-- Right: Upload / Gallery -->
<div class="flex flex-1 justify-end">
<button class="flex flex-col items-center gap-1.5 group">
<div class="w-10 h-10 rounded-xl border-2 border-white/20 overflow-hidden shadow-lg group-active:scale-95 transition-transform relative bg-[#222]">
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Thumbnail of last saved video in gallery" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC3r_WVYWr1iKoNlMkBBpTiVh8pWWzloUGPxc_mZVsyLftkV_s-AAl_nxaFngzDL-A07dM3BuahcFgwnfLhWBoazRSf1fMVIAxXTWXdavS8VkdV2V8HbNB0VBVWxXIkaWCoajgkhvoP-tiH0Zo_vZx3wHCcAZEeJBrDt_wyWj23p6Lm05LSuUyj7MUNRa04iuhkEtjCLgX5dt3-mA3A1vT6CnI3DhN4OfzOlw8pM-hWIy1INwk8KJsWf1HbKO3GcNr3TLz7YxoL");'></div>
<div class="absolute inset-0 bg-black/10 flex items-center justify-center">
<!-- Offline indicator hint -->
<span class="material-symbols-outlined text-white/80 text-sm drop-shadow-md">upload</span>
</div>
</div>
<span class="text-[11px] font-semibold text-white/90 drop-shadow-md">Upload</span>
</button>
</div>
</div>
</div>
</div>
</div>
</body></html>
