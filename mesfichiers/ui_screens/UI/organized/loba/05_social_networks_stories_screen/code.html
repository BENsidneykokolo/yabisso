<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Social Stories</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .story-gradient-overlay {
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 15%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.8) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white font-display overflow-hidden antialiased select-none">
<!-- Main Container: Simulating a full-screen mobile view -->
<div class="relative flex flex-col h-screen w-full max-w-md mx-auto bg-black overflow-hidden shadow-2xl group/design-root">
<!-- Background Image (Story Content) -->
<div class="absolute inset-0 z-0 bg-center bg-cover bg-no-repeat transition-transform duration-700 ease-out hover:scale-105" data-alt="Group of friends laughing together at an outdoor evening gathering" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCB-q5_v-rpF4EQ4-7rvGOr9ykjqRKg7uS8BL4AnLJjlynE4AV0rKHCafQxasNrclMRqXQBk0hEyxYlzXLP7_KYGAg6vIixZM6Zluy-bo1KOaVMoVPpwfw9mf3abFt-L7hT7WhjXBBKnYvCaQgQOoNVYxvbdpH37u2YNnplN_TbnO5wZC-3pvZq6-laxPK85bb14mKQH9OVhJADJLXPN5Ucw-tU6dOIssIqVhFn2C0oZl7lnug_Jo92CT4b1wFQ_uhg_hWA0MDH');">
</div>
<!-- Gradient Overlay for Legibility -->
<div class="absolute inset-0 z-10 story-gradient-overlay pointer-events-none"></div>
<!-- Touch Zones for Navigation (Invisible) -->
<div class="absolute inset-0 z-10 flex">
<div class="w-1/3 h-full cursor-w-resize" title="Previous Story"></div>
<div class="w-1/3 h-full cursor-pointer" title="Pause"></div>
<div class="w-1/3 h-full cursor-e-resize" title="Next Story"></div>
</div>
<!-- TOP SECTION: Progress & Header -->
<div class="relative z-20 flex flex-col pt-3 px-3 w-full">
<!-- PageIndicators: Adapted to Story Progress Bars -->
<div class="flex w-full flex-row items-center justify-center gap-1.5 pb-3">
<!-- Viewed Story -->
<div class="h-1 flex-1 rounded-full bg-white/90"></div>
<!-- Current Active Story -->
<div class="h-1 flex-1 rounded-full bg-white/30 overflow-hidden">
<div class="h-full w-[65%] bg-primary rounded-full"></div>
</div>
<!-- Upcoming Stories -->
<div class="h-1 flex-1 rounded-full bg-white/30"></div>
<div class="h-1 flex-1 rounded-full bg-white/30"></div>
</div>
<!-- ListItem: Adapted for User Header -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<!-- Avatar with "Story Ring" -->
<div class="relative p-[2px] rounded-full bg-gradient-to-tr from-[#137fec] via-[#fcd34d] to-[#ef4444]">
<div class="bg-black p-[2px] rounded-full">
<div class="bg-center bg-no-repeat bg-cover rounded-full h-9 w-9" data-alt="Portrait of Kofi smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCqGbYrSUO24nUIfiRid6ifRv2rFghwzv6E1gEh_OblK4Y-h7AQzC7_kFBTuU5jPOjvEulBCmwRfoGuPRul1mZcAtTDbAva-51173siecgdFFrZv6o_9ouLF46vFZGgAhNMpd7QMse9AXgtjPFbh2WHhEWixjkU_I0O5MFxK1ei824q6LnmdziyYjJ4VEJH0KSvdWJULaDHq2TurIBY-19W-K_FMDk7hZKfK3a8pS57RnRVmbqtbfhDghBl4F5IIlSyxOsuXolf");'>
</div>
</div>
</div>
<div class="flex flex-col justify-center drop-shadow-md">
<p class="text-white text-sm font-bold leading-tight">Kofi Tech</p>
<div class="flex items-center gap-1.5">
<p class="text-white/80 text-xs font-medium leading-none">45m ago</p>
<!-- Offline Indicator (Cloud Off) -->
<span class="material-symbols-outlined text-white/60 text-[14px]" title="Cached / Offline Mode">cloud_off</span>
</div>
</div>
</div>
<!-- Header Actions -->
<div class="flex items-center gap-2">
<button class="flex items-center justify-center h-10 w-10 text-white/90 rounded-full hover:bg-white/10 transition-colors z-30">
<span class="material-symbols-outlined">more_vert</span>
</button>
<button class="flex items-center justify-center h-10 w-10 text-white rounded-full hover:bg-white/10 transition-colors z-30">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
</div>
<!-- Spacer to push content down -->
<div class="flex-1"></div>
<!-- BOTTOM SECTION: Interactions -->
<div class="relative z-30 flex flex-col w-full pb-6 px-4 gap-4">
<!-- "See More" Swipe Up Indicator -->
<div class="flex flex-col items-center justify-center gap-1 opacity-80 animate-pulse">
<span class="material-symbols-outlined text-white text-2xl leading-none">keyboard_arrow_up</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white drop-shadow-md">See More</span>
</div>
<!-- Composer & Reactions Row -->
<div class="flex items-center gap-3 w-full">
<!-- Input Pill -->
<label class="flex-1 min-w-0 h-12">
<div class="flex w-full h-full items-center rounded-full border border-white/30 bg-white/10 backdrop-blur-md px-4 focus-within:bg-black/40 focus-within:border-white/60 transition-all duration-200">
<input class="flex w-full min-w-0 bg-transparent text-white placeholder:text-white/70 focus:outline-none border-none p-0 text-sm font-medium" placeholder="Reply to Kofi..." value=""/>
</div>
</label>
<!-- Floating Reactions (Quick Actions) -->
<div class="flex items-center gap-2 shrink-0">
<!-- Heart -->
<button class="flex items-center justify-center h-12 w-12 rounded-full bg-white/10 backdrop-blur-md border border-white/10 active:scale-90 transition-transform hover:bg-white/20">
<span class="material-symbols-outlined text-red-500 text-[26px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
<!-- Fire -->
<button class="flex items-center justify-center h-12 w-12 rounded-full bg-white/10 backdrop-blur-md border border-white/10 active:scale-90 transition-transform hover:bg-white/20">
<span class="material-symbols-outlined text-yellow-500 text-[26px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</button>
<!-- Send Button (Primary) -->
<button class="flex items-center justify-center h-12 w-12 rounded-full bg-primary text-white shadow-lg shadow-blue-500/40 active:scale-90 transition-transform hover:bg-blue-600">
<span class="material-symbols-outlined -ml-0.5 mt-0.5 text-[22px]">send</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
