<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso - Event Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#192633",
                        "brand-red": "#ef4444",
                        "brand-yellow": "#eab308",
                        "brand-green": "#22c55e",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "2xl": "2.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom Ticket Styles */
        .ticket-cutout {
            position: relative;
        }
        .ticket-cutout::before, .ticket-cutout::after {
            content: '';
            position: absolute;
            height: 40px;
            width: 40px;
            background-color: #101922; /* Matches page background */
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        .ticket-cutout::before { left: -20px; }
        .ticket-cutout::after { right: -20px; }
        
        .dashed-line {
            background-image: linear-gradient(to right, #334155 50%, rgba(255,255,255,0) 0%);
            background-position: bottom;
            background-size: 16px 2px;
            background-repeat: repeat-x;
        }

        /* Abstract Pattern for African Tech Vibe */
        .bg-pattern {
            background-image: radial-gradient(circle at 10% 20%, rgba(19, 127, 236, 0.08) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(234, 179, 8, 0.08) 0%, transparent 20%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-x-hidden antialiased selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl bg-pattern">
<!-- Header -->
<div class="flex items-center px-4 pt-6 pb-2 justify-between sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
<button class="text-white flex size-10 shrink-0 items-center justify-center rounded-full bg-white/5 active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center font-display">Your Event Ticket</h2>
<button class="flex size-10 items-center justify-center rounded-full bg-white/5 active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white text-[20px]">more_vert</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 flex flex-col items-center px-4 pb-24 pt-4">
<!-- Ticket Container -->
<div class="w-full flex flex-col">
<!-- Ticket Top (QR Section) -->
<div class="relative bg-surface-dark rounded-t-2xl p-6 pb-8 border border-b-0 border-white/5 shadow-xl">
<!-- Event Branding Badge -->
<div class="flex justify-center mb-6">
<div class="bg-white/5 backdrop-blur-sm border border-white/10 px-3 py-1.5 rounded-full flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-brand-green animate-pulse"></span>
<span class="text-xs font-medium text-gray-300 font-body uppercase tracking-wider">Verified Ticket</span>
</div>
</div>
<!-- QR Code Area -->
<div class="mx-auto w-64 h-64 bg-white rounded-xl p-4 flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.05)] relative overflow-hidden">
<div class="absolute inset-0 border-4 border-primary/20 rounded-xl m-1 pointer-events-none"></div>
<!-- Using an abstract placeholder for QR code -->
<img alt="QR code for event entry" class="w-full h-full object-contain mix-blend-multiply opacity-90" data-alt="Black and white QR code pattern for scanning" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDa177YoXkeURtrYJadavo_xsMXi5nP1Fi9qCvsMTgdQmMEt_UDvEPwIdo34NRsSK0ZEqFeY6k87p_NjBPc9c7CoZIO6er9OrQuMm6t9cKsQbl3nunN-mYzN3xQW1U1KFTwY6guWgZJioa3DLtD0f5Qjcuuc1tXHsA0uWq-n0-Sm2Ff1Bt44qPCrhQt05IGP-rwqvjGNCcNjmSoLR0wtlMMbS2G4pgVOcJl_rDZT9vaoanaPKjv0JGMd8sbYKfqLNGavyH3gGMB"/>
<!-- Offline Indicator -->
<div class="absolute bottom-2 right-2">
<span class="material-symbols-outlined text-brand-green text-[18px]" title="Available Offline">offline_pin</span>
</div>
</div>
<p class="text-center text-gray-400 text-sm mt-4 font-body">Scan this code at the entrance</p>
</div>
<!-- Perforation / Divider -->
<div class="h-8 bg-surface-dark relative ticket-cutout flex items-center justify-center overflow-hidden w-full">
<div class="w-[85%] h-[2px] dashed-line opacity-30"></div>
</div>
<!-- Ticket Bottom (Info Section) -->
<div class="bg-surface-dark rounded-b-2xl p-6 pt-2 border border-t-0 border-white/5 shadow-xl flex flex-col gap-6">
<!-- Event Title & Image -->
<div class="flex gap-4 items-start">
<div class="w-16 h-16 rounded-lg bg-cover bg-center shrink-0 shadow-lg" data-alt="Crowd at a concert with purple lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBRgjQWzR4i_S_GqvXzWjoMcqwSM0NmKpCDVfBzszA3T-sSQ3gh5e7HhgQi9PpeeaBdFonTgHs8ITiNNCYoJ0BK1LCn5_pb6BLUbAW6pDq7qNjaydDigd7wEFEIkL_QNr4it2lr8tUtrSHPfWvmLqx57Rw8x7ubuFgUTFDFvIzS6U2jD49OdKN-b-7levb5U0N_T6Atle7mKVpLqm462_7pOcMlTGk_v5kHb-Ed2m42a0zyRjcobXPbzBsLffq7qtWIbdSnytET');"></div>
<div>
<h1 class="text-2xl font-bold text-white font-display leading-tight mb-1">Afro-Tech Summit 2024</h1>
<p class="text-primary text-sm font-medium font-body flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">location_on</span>
                                Kigali Convention Centre
                            </p>
</div>
</div>
<!-- Grid Info -->
<div class="grid grid-cols-2 gap-y-6 gap-x-4 border-t border-white/10 pt-6">
<div class="flex flex-col gap-1">
<p class="text-gray-400 text-xs uppercase tracking-wider font-body">Date</p>
<p class="text-white font-bold font-display text-lg">Oct 12, 2024</p>
</div>
<div class="flex flex-col gap-1">
<p class="text-gray-400 text-xs uppercase tracking-wider font-body">Time</p>
<p class="text-white font-bold font-display text-lg">18:00 WAT</p>
</div>
<div class="flex flex-col gap-1">
<p class="text-gray-400 text-xs uppercase tracking-wider font-body">Gate</p>
<div class="flex items-center gap-2">
<p class="text-white font-bold font-display text-lg">A4</p>
<span class="text-xs bg-white/10 px-1.5 py-0.5 rounded text-gray-300">East</span>
</div>
</div>
<div class="flex flex-col gap-1">
<p class="text-gray-400 text-xs uppercase tracking-wider font-body">Seat</p>
<p class="text-white font-bold font-display text-lg">VIP-24</p>
</div>
</div>
<!-- Reference Number -->
<div class="flex items-center justify-between bg-background-dark/50 rounded-lg p-3 border border-white/5">
<span class="text-gray-400 text-xs font-body">Booking Ref</span>
<span class="text-white font-mono text-sm tracking-widest">YB-99283-XJ</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full mt-6 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white font-medium text-sm font-body border border-white/10">
<span class="material-symbols-outlined text-[20px]">share</span>
                    Share
                </button>
<button class="flex items-center justify-center gap-2 h-12 rounded-full bg-primary hover:bg-primary/90 transition-colors text-white font-bold text-sm font-body shadow-[0_0_15px_rgba(19,127,236,0.3)]">
<span class="material-symbols-outlined text-[20px]">download</span>
                    Save PDF
                </button>
</div>
<button class="mt-4 flex items-center justify-center gap-2 w-full h-12 rounded-full bg-[#111] border border-gray-800 text-white font-medium text-sm font-body">
<img alt="Wallet" class="w-5 h-5 object-contain" data-alt="Apple Wallet icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRJ1qCIFNVOlXVvajBza1hxEdCUD0-4YGxc67Qt4PEYRzwPKxY7zi5dUUAG0XCm8SqD9S1RLP2Xqbu8ihQba4iM2sjXsfakUjoJUQc1dVoQLS9DOVU88AwyaYKcZPzxAyZfWVSULtJqNrmFuswqXMwnC0q9nS0kza1g_a5E-0ITAdbu1ZSR5NNxGYOApCJtcgf6PeaDQ7-xh2XTWtiIrW-YVW6mR8x_K_7qjx17I29p7LTjUlKD_tGRZtFP_ZQNKlDb0zDeVsx"/>
                Add to Apple Wallet
            </button>
</div>
<!-- Bottom Navigation Bar (Yabisso Standard) -->
<div class="fixed bottom-0 w-full max-w-md bg-surface-dark border-t border-white/5 px-6 py-4 pb-8 flex justify-between items-center z-50 rounded-t-2xl">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">home</span>
<span class="text-[10px] text-gray-400 group-hover:text-primary font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">account_balance_wallet</span>
<span class="text-[10px] text-gray-400 group-hover:text-primary font-medium">Wallet</span>
</button>
<!-- Active State for Tickets -->
<button class="flex flex-col items-center gap-1 group relative">
<div class="absolute -top-10 bg-primary rounded-full p-3 shadow-lg shadow-primary/30 border-4 border-background-dark">
<span class="material-symbols-outlined text-white">confirmation_number</span>
</div>
<div class="h-6"></div> <!-- Spacer for floating button -->
<span class="text-[10px] text-white font-bold">Tickets</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">local_mall</span>
<span class="text-[10px] text-gray-400 group-hover:text-primary font-medium">Market</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">person</span>
<span class="text-[10px] text-gray-400 group-hover:text-primary font-medium">Profile</span>
</button>
</div>
</div>
</body></html>
