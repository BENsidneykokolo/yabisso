<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kiosque Admin - Offline Transactions</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#142210",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-50 transition-colors duration-300">
<!-- Mobile Container -->
<div class="max-w-md mx-auto min-h-screen relative flex flex-col pb-32 overflow-hidden shadow-2xl bg-background-light dark:bg-background-dark ring-1 ring-black/5">
<!-- Header -->
<header class="sticky top-0 z-20 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md px-4 pt-6 pb-2">
<div class="flex items-center justify-between mb-2">
<button class="flex items-center justify-center size-12 rounded-full bg-white dark:bg-white/10 shadow-sm hover:bg-gray-50 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-800 dark:text-white" style="font-size: 24px;">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Offline Mode</h2>
<span class="text-xs font-medium text-slate-500 dark:text-slate-400">Sync Required</span>
</div>
<button class="flex items-center justify-center size-12 rounded-full bg-transparent">
<!-- Spacer for balance -->
<span class="material-symbols-outlined text-transparent" style="font-size: 24px;">more_vert</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 px-4 flex flex-col gap-6 mt-2">
<!-- Stats / Summary Card -->
<div class="w-full bg-primary/20 dark:bg-primary/10 rounded-xl p-6 flex flex-row items-center justify-between border border-primary/30 relative overflow-hidden group">
<!-- Background decoration -->
<div class="absolute -right-6 -top-6 size-24 bg-primary/20 rounded-full blur-2xl"></div>
<div class="flex flex-col gap-1 z-10">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium uppercase tracking-wider">Items Pending</p>
<p class="text-slate-900 dark:text-white text-4xl font-extrabold">3</p>
</div>
<div class="size-14 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/40 z-10">
<span class="material-symbols-outlined text-black font-bold" style="font-size: 28px;">cloud_off</span>
</div>
</div>
<!-- Transaction List -->
<div class="flex flex-col gap-3">
<h3 class="text-lg font-bold text-slate-800 dark:text-white px-1">Transactions</h3>
<!-- Pending Transfer Item -->
<div class="group flex items-center gap-4 bg-white dark:bg-white/5 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-white/5 active:scale-[0.99] transition-transform">
<div class="flex items-center justify-center rounded-full bg-blue-100 dark:bg-blue-900/30 shrink-0 size-14">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" style="font-size: 28px;">arrow_forward</span>
</div>
<div class="flex flex-col flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-lg font-bold truncate">Send 500 Pts</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium truncate">To: User #492</p>
</div>
<div class="shrink-0 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-amber-500" style="font-size: 24px;">schedule</span>
<span class="text-[10px] font-bold text-amber-500 uppercase tracking-wide">Wait</span>
</div>
</div>
<!-- Error Item (New User) -->
<div class="group flex items-center gap-4 bg-red-50 dark:bg-red-900/10 p-4 rounded-xl shadow-sm border border-red-100 dark:border-red-500/20 active:scale-[0.99] transition-transform">
<div class="flex items-center justify-center rounded-full bg-white dark:bg-white/10 shrink-0 size-14">
<span class="material-symbols-outlined text-red-600 dark:text-red-400" style="font-size: 28px;">person_add</span>
</div>
<div class="flex flex-col flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-lg font-bold truncate">New User: Ali M.</p>
<p class="text-red-600 dark:text-red-400 text-sm font-bold truncate">Sync Failed - Tap to Retry</p>
</div>
<div class="shrink-0 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-red-600 dark:text-red-400" style="font-size: 24px;">error</span>
<span class="text-[10px] font-bold text-red-600 dark:text-red-400 uppercase tracking-wide">Error</span>
</div>
</div>
<!-- Pending Transfer Item -->
<div class="group flex items-center gap-4 bg-white dark:bg-white/5 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-white/5 active:scale-[0.99] transition-transform">
<div class="flex items-center justify-center rounded-full bg-blue-100 dark:bg-blue-900/30 shrink-0 size-14">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" style="font-size: 28px;">arrow_forward</span>
</div>
<div class="flex flex-col flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-lg font-bold truncate">Send 120 Pts</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium truncate">To: User #331</p>
</div>
<div class="shrink-0 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-amber-500" style="font-size: 24px;">schedule</span>
<span class="text-[10px] font-bold text-amber-500 uppercase tracking-wide">Wait</span>
</div>
</div>
<!-- Placeholder for visual length -->
<div class="opacity-50 group flex items-center gap-4 bg-white dark:bg-white/5 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-white/5">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 shrink-0 size-14">
<span class="material-symbols-outlined text-gray-400" style="font-size: 28px;">check</span>
</div>
<div class="flex flex-col flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-lg font-bold truncate">Synced Item</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium truncate">Yesterday</p>
</div>
</div>
</div>
</main>
<!-- Floating Action Area - Manual Sync Button -->
<div class="fixed bottom-[88px] left-0 right-0 p-4 max-w-md mx-auto z-30 pointer-events-none">
<button class="pointer-events-auto w-full bg-white dark:bg-slate-800 text-primary border-2 border-primary shadow-xl shadow-primary/20 hover:shadow-primary/40 active:scale-95 transition-all h-16 rounded-full flex items-center justify-center gap-3 group">
<span class="material-symbols-outlined group-hover:animate-spin" style="font-size: 28px;">sync</span>
<span class="text-xl font-bold tracking-tight">Manual Sync</span>
</button>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-[#1a2c15] border-t border-slate-100 dark:border-white/5 px-6 py-4 flex justify-between items-center z-40 max-w-md mx-auto rounded-t-2xl shadow-[0_-5px_20px_-5px_rgba(0,0,0,0.1)]">
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary relative">
<div class="absolute -top-3 size-1.5 bg-primary rounded-full"></div>
<span class="material-symbols-outlined fill-1" style="font-size: 28px;">receipt_long</span>
<span class="text-[10px] font-bold">Offline</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">group</span>
<span class="text-[10px] font-medium">Users</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</button>
</nav>
</div>
</body></html>
