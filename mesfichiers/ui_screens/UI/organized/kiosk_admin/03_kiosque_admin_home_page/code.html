<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kiosque Admin Home Page</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#142210",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e3318",
                        "text-main": "#111b0d",
                        "text-subtle": "#5e9a4c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem", 
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 1,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
        /* Custom oversized icon class */
        .icon-massive {
            font-size: 48px !important;
        }
        .icon-large {
            font-size: 32px !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main dark:text-white pb-28 selection:bg-primary selection:text-black">
<!-- Top Navigation / Brand -->
<div class="flex items-center p-5 justify-between">
<h2 class="text-xl font-black leading-tight tracking-tight flex-1">Kiosque Admin</h2>
<button class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
<!-- Profile & Sync Status Section -->
<div class="px-4 mb-6">
<div class="bg-surface-light dark:bg-surface-dark p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-white/5">
<div class="flex items-center gap-4 mb-5">
<!-- Profile Image -->
<div class="bg-center bg-no-repeat bg-cover rounded-full h-16 w-16 shrink-0 border-2 border-primary" data-alt="Portrait of a friendly local kiosk agent smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBptHXSiLcSF4yw0WNcoQHssK9tOboPcekLCTk6e0Xms5yVN4XMnViyv7dz669WR5U82BwAO3rmd6Ho2WfBlAuvgxq3f6PCYuUAJPnOKINw48mMgoZ3EAm7JAuCNAoMEQK_1G887NX8y5oNS9zL-g3esOrUBWtVEGQTXzWKqW51dL7z2XCGPil0GB6iISgvEHyeqz9OCrT5QHcgIEUn8uzGUxkX3orWDHTbalO1Ymd87DGvxvXuCd0Qtj20Y0GuY9CiRM1yw8gJ");'>
</div>
<!-- Info -->
<div class="flex flex-col justify-center">
<p class="text-lg font-bold leading-tight">Hello, Kiosque Bamako</p>
<div class="flex items-center gap-1 text-text-subtle dark:text-primary/80 mt-1">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<p class="text-sm font-medium">Bamako Market Central</p>
</div>
</div>
</div>
<!-- Sync Status Pill -->
<div class="flex items-center gap-3 bg-[#eaf3e7] dark:bg-white/5 p-3 rounded-xl border border-primary/20">
<div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-primary text-black">
<span class="material-symbols-outlined">cloud_done</span>
</div>
<div class="flex flex-col">
<p class="text-sm font-bold text-black dark:text-primary">System Synced</p>
<p class="text-xs text-gray-600 dark:text-gray-400">All data saved offline</p>
</div>
</div>
</div>
</div>
<!-- Balance & Stats Module -->
<div class="px-4 mb-8">
<!-- Hero Balance Card -->
<div class="w-full rounded-2xl p-6 bg-primary shadow-lg mb-4 relative overflow-hidden group">
<!-- Decorative circle -->
<div class="absolute -right-10 -top-10 w-40 h-40 bg-white/20 rounded-full blur-2xl pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center text-center gap-1 py-2">
<p class="text-black/80 text-lg font-bold uppercase tracking-wide">Current Balance</p>
<div class="flex items-baseline gap-1">
<p class="text-black tracking-tighter text-5xl font-black leading-none">12,500</p>
<span class="text-black font-bold text-xl">pts</span>
</div>
</div>
</div>
<!-- Secondary Stat: Users Assisted -->
<div class="flex items-center gap-4 bg-surface-light dark:bg-surface-dark p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-white/5">
<div class="h-14 w-14 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-300">
<span class="material-symbols-outlined icon-large">group</span>
</div>
<div>
<p class="text-3xl font-black leading-none">14</p>
<p class="text-gray-500 dark:text-gray-400 font-medium text-sm mt-1">Users Assisted Today</p>
</div>
</div>
</div>
<!-- Quick Actions Grid -->
<div class="px-4">
<h2 class="text-xl font-bold mb-4 px-1">Quick Actions</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Scan User Button -->
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-2xl bg-surface-light dark:bg-surface-dark shadow-md border-b-4 border-gray-200 dark:border-white/10 active:border-b-0 active:translate-y-1 transition-all h-40">
<div class="h-16 w-16 rounded-full bg-primary/20 flex items-center justify-center text-black dark:text-primary">
<span class="material-symbols-outlined icon-massive">qr_code_scanner</span>
</div>
<span class="font-bold text-lg">Scan User</span>
</button>
<!-- Register New Button -->
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-2xl bg-surface-light dark:bg-surface-dark shadow-md border-b-4 border-gray-200 dark:border-white/10 active:border-b-0 active:translate-y-1 transition-all h-40">
<div class="h-16 w-16 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-600 dark:text-purple-300">
<span class="material-symbols-outlined icon-massive">person_add</span>
</div>
<span class="font-bold text-lg">Register New</span>
</button>
<!-- Send Points Button (Full Width) -->
<button class="col-span-2 flex items-center justify-between px-8 py-6 rounded-2xl bg-surface-light dark:bg-surface-dark shadow-md border-b-4 border-gray-200 dark:border-white/10 active:border-b-0 active:translate-y-1 transition-all">
<div class="flex items-center gap-4">
<div class="h-14 w-14 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-600 dark:text-orange-300">
<span class="material-symbols-outlined icon-large">currency_exchange</span>
</div>
<span class="font-bold text-lg text-left">Transfer Points</span>
</div>
<span class="material-symbols-outlined text-gray-400">arrow_forward_ios</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-light dark:bg-surface-dark border-t border-gray-200 dark:border-gray-800 pb-safe pt-2 px-6 h-24 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
<div class="flex justify-between items-center h-full pb-4">
<!-- Home (Active) -->
<button class="flex flex-col items-center gap-1 text-primary w-20">
<div class="bg-primary/10 px-5 py-1 rounded-full">
<span class="material-symbols-outlined icon-large filled">home</span>
</div>
<span class="text-xs font-bold">Home</span>
</button>
<!-- History -->
<button class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 w-20 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
<span class="material-symbols-outlined icon-large">history</span>
<span class="text-xs font-medium">History</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 w-20 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
<span class="material-symbols-outlined icon-large">settings</span>
<span class="text-xs font-medium">Settings</span>
</button>
</div>
</div>
</body></html>
