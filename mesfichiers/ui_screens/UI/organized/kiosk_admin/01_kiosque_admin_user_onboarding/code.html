<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kiosque Admin User Onboarding</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#142210",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e3018",
                        "text-main": "#111b0d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-white font-display antialiased min-h-screen flex flex-col pb-24">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm px-4 pt-6 pb-2">
<div class="flex items-center justify-between">
<button aria-label="Go back" class="flex items-center justify-center size-12 rounded-full bg-surface-light dark:bg-surface-dark shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-12">New User Signup</h1>
</div>
</div>
<!-- Main Content Scrollable Area -->
<main class="flex-1 px-4 space-y-6 pt-4">
<!-- Section 1: Scan QR Code Action -->
<section class="@container">
<div class="flex flex-col items-center justify-center rounded-2xl bg-surface-light dark:bg-surface-dark shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden">
<!-- Illustration Area -->
<div class="w-full aspect-[21/9] bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center relative overflow-hidden" data-alt="Abstract green geometric pattern representing digital scanning">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
<div class="size-20 rounded-2xl bg-primary/20 flex items-center justify-center backdrop-blur-md z-10">
<span class="material-symbols-outlined text-4xl text-primary icon-filled">qr_code_scanner</span>
</div>
</div>
<div class="flex w-full flex-col items-center justify-center gap-4 p-6">
<div class="text-center">
<h2 class="text-xl font-bold leading-tight">Scan User Code</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm mt-1">For users with an offline QR code</p>
</div>
<button class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-xl h-14 bg-primary text-text-main text-lg font-bold shadow-md hover:bg-[#3cd610] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">photo_camera</span>
<span>Open Camera</span>
</button>
</div>
</div>
</section>
<div class="flex items-center gap-4">
<div class="h-px flex-1 bg-gray-200 dark:bg-gray-700"></div>
<span class="text-sm font-medium text-gray-400 uppercase tracking-widest">Or Manual</span>
<div class="h-px flex-1 bg-gray-200 dark:bg-gray-700"></div>
</div>
<!-- Section 2: Assign Profile Role -->
<section>
<h3 class="text-lg font-bold px-1 pb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">badge</span>
                Assign Role
            </h3>
<div class="grid grid-cols-2 gap-4">
<!-- User Role (Active State) -->
<label class="cursor-pointer group relative">
<input checked="" class="peer sr-only" name="role" type="radio" value="user"/>
<div class="flex flex-col items-center justify-center gap-3 p-5 rounded-2xl bg-surface-light dark:bg-surface-dark border-2 border-transparent shadow-sm peer-checked:border-primary peer-checked:bg-primary/5 transition-all h-full">
<div class="size-14 rounded-full bg-gray-100 dark:bg-gray-800 peer-checked:bg-primary peer-checked:text-black flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
<span class="font-bold text-lg peer-checked:text-primary dark:peer-checked:text-primary transition-colors">User</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined icon-filled">check_circle</span>
</div>
</label>
<!-- Seller Role (Inactive State) -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="role" type="radio" value="seller"/>
<div class="flex flex-col items-center justify-center gap-3 p-5 rounded-2xl bg-surface-light dark:bg-surface-dark border-2 border-transparent shadow-sm peer-checked:border-primary peer-checked:bg-primary/5 transition-all h-full">
<div class="size-14 rounded-full bg-gray-100 dark:bg-gray-800 peer-checked:bg-primary peer-checked:text-black flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-3xl">storefront</span>
</div>
<span class="font-bold text-lg text-gray-500 peer-checked:text-primary transition-colors">Seller</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined icon-filled">check_circle</span>
</div>
</label>
</div>
</section>
<!-- Section 3: Manual Input Form -->
<section>
<h3 class="text-lg font-bold px-1 pb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">edit_note</span>
                Details
            </h3>
<div class="space-y-4">
<!-- Phone Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-2xl group-focus-within:text-primary transition-colors">phone_iphone</span>
</div>
<input class="block w-full rounded-xl border-0 py-4 pl-14 text-text-main dark:text-white bg-surface-light dark:bg-surface-dark shadow-sm ring-1 ring-inset ring-gray-200 dark:ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-lg sm:leading-6 font-medium h-16 transition-shadow" placeholder="Phone Number" type="tel"/>
</div>
<!-- Name Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-2xl group-focus-within:text-primary transition-colors">id_card</span>
</div>
<input class="block w-full rounded-xl border-0 py-4 pl-14 text-text-main dark:text-white bg-surface-light dark:bg-surface-dark shadow-sm ring-1 ring-inset ring-gray-200 dark:ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-lg sm:leading-6 font-medium h-16 transition-shadow" placeholder="Full Name" type="text"/>
</div>
</div>
</section>
<!-- Spacer for FAB -->
<div class="h-24"></div>
</main>
<!-- Floating Validate Action Button (Sticky above nav) -->
<div class="fixed bottom-[90px] left-0 right-0 px-4 z-40">
<button class="w-full bg-primary hover:bg-[#3cd610] text-black h-16 rounded-2xl font-bold text-xl shadow-[0_4px_14px_rgba(70,236,19,0.4)] flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
<span>Validate Signup</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-surface-light dark:bg-surface-dark border-t border-gray-100 dark:border-gray-800 pb-safe pt-2 px-2 z-50 h-[80px] rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<ul class="flex justify-around items-center h-full pb-2">
<li class="flex-1">
<a class="flex flex-col items-center justify-center gap-1 p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">grid_view</span>
<span class="text-[10px] font-bold">Home</span>
</a>
</li>
<li class="flex-1">
<a class="flex flex-col items-center justify-center gap-1 p-2 text-primary" href="#">
<div class="relative">
<span class="material-symbols-outlined text-3xl icon-filled">person_add</span>
<span class="absolute -top-1 -right-1 flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-primary"></span>
</span>
</div>
<span class="text-[10px] font-bold">Onboard</span>
</a>
</li>
<li class="flex-1">
<a class="flex flex-col items-center justify-center gap-1 p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">currency_exchange</span>
<span class="text-[10px] font-bold">Transfers</span>
</a>
</li>
<li class="flex-1">
<a class="flex flex-col items-center justify-center gap-1 p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">settings</span>
<span class="text-[10px] font-bold">Settings</span>
</a>
</li>
</ul>
</nav>

        // Note: This is purely visual for the demo, no real JS logic requested.
        const inputs = document.querySelectorAll('input[type="text"], input[type="tel"]');
        const submitBtn = document.querySelector('button.bg-primary.text-black.h-16');

</body></html>
