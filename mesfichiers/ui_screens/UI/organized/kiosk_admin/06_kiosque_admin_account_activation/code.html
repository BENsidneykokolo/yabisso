<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kiosque Admin - Activate Account</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#142210",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-xl bg-background-light dark:bg-background-dark">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 z-10 bg-background-light dark:bg-background-dark">
<button class="flex size-12 shrink-0 items-center justify-center rounded-full bg-white dark:bg-[#2a3825] shadow-sm text-neutral-800 dark:text-white hover:bg-neutral-100 dark:hover:bg-[#35452f] transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-neutral-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Activate Account</h2>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col px-4 pt-2 pb-24 space-y-6">
<!-- Headline -->
<div class="flex flex-col items-center">
<h2 class="text-neutral-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight text-center mt-2">New User?</h2>
<p class="text-neutral-600 dark:text-neutral-300 text-lg font-normal leading-normal pt-2 text-center">Select an option to find the user</p>
</div>
<!-- Primary Action: Scan QR -->
<div class="w-full">
<div class="relative flex flex-col items-center justify-center rounded-2xl bg-white dark:bg-[#1a2c15] p-6 shadow-md border border-neutral-100 dark:border-neutral-800">
<div class="w-full aspect-[4/3] bg-neutral-100 dark:bg-[#253820] rounded-xl flex items-center justify-center mb-6 overflow-hidden relative group cursor-pointer">
<div class="absolute inset-0 bg-cover bg-center opacity-40 group-hover:opacity-60 transition-opacity duration-300" data-alt="Blurred background suggesting a camera view scanning a QR code" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC_WFdXiT42JLMuLgDfuIhS9wkVH14_zgAecvYVW-dCuKsraRqLxSmk1HeINYPY819cNzV0DdxerrMkQgxsslXyA_fAR2Y_iHKhdC1DRX8ZPElOks0PkaHlBY6eeuZwqkG5-6WqifMJQeVAVK3f7X6vseFjZiYUbrpCaiHbAWfWIXENpnxOGVEtbGTNDRcGc4UzYw6p2WXILNxkE95_jtWPB6Og5teaGF1ImM4yGh3iO0hu2vO2w8ewhKufph8T32aUZbtqPngz");'></div>
<div class="bg-white/90 dark:bg-black/60 p-4 rounded-full shadow-lg z-10">
<span class="material-symbols-outlined text-primary" style="font-size: 48px;">qr_code_scanner</span>
</div>
</div>
<h3 class="text-neutral-900 dark:text-white text-2xl font-bold mb-2">Scan QR Code</h3>
<p class="text-neutral-500 dark:text-neutral-400 text-center mb-6">Point camera at customer's phone</p>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 bg-primary text-[#052e01] text-lg font-bold shadow-[0_4px_12px_rgba(70,236,19,0.4)] hover:shadow-[0_6px_16px_rgba(70,236,19,0.5)] transition-all active:scale-95">
<span class="material-symbols-outlined mr-2">photo_camera</span>
<span>Open Camera</span>
</button>
</div>
</div>
<!-- Secondary Action: Manual Entry -->
<div class="w-full">
<button class="flex w-full cursor-pointer items-center justify-between rounded-2xl h-20 px-6 bg-white dark:bg-[#1a2c15] text-neutral-900 dark:text-white shadow-sm border border-neutral-100 dark:border-neutral-800 hover:bg-neutral-50 dark:hover:bg-[#253820] transition-colors">
<div class="flex items-center gap-4">
<div class="bg-primary/20 dark:bg-primary/10 p-3 rounded-full text-primary-700 dark:text-primary">
<span class="material-symbols-outlined" style="font-size: 28px;">dialpad</span>
</div>
<div class="flex flex-col items-start">
<span class="text-lg font-bold">Enter ID Number</span>
<span class="text-sm text-neutral-500 dark:text-neutral-400">Type manually</span>
</div>
</div>
<span class="material-symbols-outlined text-neutral-400">chevron_right</span>
</button>
</div>
<!-- Pending Verification Card (Example State) -->
<div class="w-full mt-4 pt-4 border-t border-dashed border-neutral-300 dark:border-neutral-700">
<p class="text-sm font-semibold uppercase tracking-wider text-neutral-500 dark:text-neutral-400 mb-4 pl-2">Recent Scan</p>
<div class="bg-white dark:bg-[#1a2c15] p-5 rounded-2xl shadow-sm border border-neutral-100 dark:border-neutral-800 flex flex-col gap-4">
<div class="flex items-center gap-4">
<div class="size-16 rounded-full bg-neutral-200 dark:bg-neutral-700 overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="Portrait of a user named Fatou" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGEMm7_0oG32VcZFpGYRCKFVtJIHOss6hMbQXDyBhaykQwX1WZeZHznoZFN_-5lWsN0FPF7ybBcnPqtGOEhoMh2n4lgrh-uOQhHiAMV8MRLGNOlmUVUgCldk6MvBZnKj-mb_Nv3b49sEn-_e3K-CUl6VpGu-9jLJImkOro850LDhYxZFKbNtZDJucRBmyzfvCRe_Zr_EMxrf2_rr_9ia0402IkR_-g2TjZUFHI7rCoGRLLzIkRW0DrrASf23qGSktm0uXzUicF"/>
</div>
<div>
<h4 class="text-xl font-bold text-neutral-900 dark:text-white">Fatou Diop</h4>
<div class="flex items-center gap-1 text-yellow-600 dark:text-yellow-400 bg-yellow-100 dark:bg-yellow-900/30 px-2 py-1 rounded-md text-xs font-medium w-fit mt-1">
<span class="material-symbols-outlined" style="font-size: 14px;">warning</span>
<span>Pending Verification</span>
</div>
</div>
</div>
<div class="flex gap-3 mt-2">
<button class="flex-1 h-12 rounded-full border-2 border-neutral-200 dark:border-neutral-700 text-neutral-600 dark:text-neutral-300 font-bold text-base hover:bg-neutral-50 dark:hover:bg-neutral-800">
                            Reject
                        </button>
<button class="flex-1 h-12 rounded-full bg-primary text-[#052e01] font-bold text-base shadow-md flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-size: 20px;">check_circle</span>
                            Confirm
                        </button>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-[#1a2c15] border-t border-neutral-200 dark:border-neutral-800 px-6 py-3 flex justify-between items-end pb-6 z-50">
<button class="flex flex-col items-center gap-1 text-neutral-400 dark:text-neutral-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary relative -top-5">
<div class="bg-primary p-4 rounded-full shadow-[0_4px_12px_rgba(70,236,19,0.3)] border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-[#052e01] text-[32px]">person_add</span>
</div>
<span class="text-[10px] font-bold text-neutral-900 dark:text-white">Activate</span>
</button>
<button class="flex flex-col items-center gap-1 text-neutral-400 dark:text-neutral-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">history</span>
<span class="text-[10px] font-medium">History</span>
</button>
</div>
</div>
</body></html>
