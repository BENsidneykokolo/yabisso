<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Film Player</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "yabisso-red": "#e63946",
                        "yabisso-yellow": "#ffb703",
                        "yabisso-green": "#2a9d8f",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased overflow-hidden h-screen w-full selection:bg-primary selection:text-white">
<!-- Main Player Container -->
<div class="relative h-full w-full flex flex-col group/player bg-black">
<!-- Video Surface (Simulated) -->
<div class="absolute inset-0 z-0">
<!-- Simulated Video Frame -->
<img class="w-full h-full object-cover opacity-90" data-alt="Cinematic wide shot of a man standing in a dimly lit, moody room" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbhduAZp41lmQgveq91JhsOWNLLv5ghQv8FAa8kPCJ7O2j8NdM4K3hrNSzdleNuvftlh_Nl71Q-ASManU832ANhZTd7vsiyEb4tRljRYIhFqUSsIk9WbdnXCLKS10O07SecK2hd4W5etwTa6GUvfBR7Nj2ZYilEtvleokupbXpw3rc9bWR9XqPzVtA_KYf2Iz88T_8N1YZSVmwprunurEs-KThjSV7aOdNQ7i6u3GcsD-iRDMuyxvuNf2zcM-Z_F2UdXGa8x5E"/>
<!-- Subtle Vignette for focus -->
<div class="absolute inset-0 bg-radial-gradient from-transparent via-black/20 to-black/60 pointer-events-none"></div>
</div>
<!-- Top Controls Overlay -->
<!-- Fades in from top -->
<div class="absolute top-0 left-0 right-0 z-30 pt-12 pb-24 px-6 bg-gradient-to-b from-black/90 via-black/50 to-transparent flex items-start justify-between transition-opacity duration-300">
<!-- Back Button -->
<button class="group flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-colors backdrop-blur-sm">
<span class="material-symbols-outlined text-white" style="font-size: 28px;">arrow_back_ios_new</span>
</button>
<!-- Metadata (Optional Center Alignment) -->
<div class="flex flex-col items-center text-center mt-1">
<span class="text-xs font-semibold tracking-widest uppercase text-white/60 mb-1">Now Playing</span>
<h1 class="text-base md:text-lg font-bold text-white tracking-wide shadow-black drop-shadow-md line-clamp-1">The Boy Who Harnessed the Wind</h1>
</div>
<!-- Cast / Options -->
<div class="flex items-center gap-4">
<button class="group flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-colors backdrop-blur-sm">
<span class="material-symbols-outlined text-white" style="font-size: 24px;">cast</span>
</button>
</div>
</div>
<!-- Center Playback Controls -->
<!-- Centered in the viewport -->
<div class="absolute inset-0 z-20 flex items-center justify-center gap-12 md:gap-20 pointer-events-auto">
<!-- Rewind 10s -->
<button class="group flex flex-col items-center justify-center p-4 rounded-full text-white/70 hover:text-white hover:bg-white/5 transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-size: 40px; font-variation-settings: 'FILL' 1;">replay_10</span>
<span class="text-[10px] font-bold mt-1 opacity-0 group-hover:opacity-100 transition-opacity">-10s</span>
</button>
<!-- Main Play/Pause Button -->
<!-- Glassmorphism effect -->
<button class="flex items-center justify-center w-20 h-20 md:w-24 md:h-24 bg-white/10 backdrop-blur-md rounded-full text-white border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.5)] hover:bg-white/20 hover:scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined ml-1" style="font-size: 48px; font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<!-- Forward 10s -->
<button class="group flex flex-col items-center justify-center p-4 rounded-full text-white/70 hover:text-white hover:bg-white/5 transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-size: 40px; font-variation-settings: 'FILL' 1;">forward_10</span>
<span class="text-[10px] font-bold mt-1 opacity-0 group-hover:opacity-100 transition-opacity">+10s</span>
</button>
</div>
<!-- Bottom Controls Overlay -->
<!-- Fades in from bottom -->
<div class="absolute bottom-0 left-0 right-0 z-30 pb-8 pt-32 px-6 bg-gradient-to-t from-black/95 via-black/80 to-transparent flex flex-col justify-end">
<!-- Download CTA -->
<!-- Placed prominently above scrub bar -->
<div class="w-full flex justify-center mb-6">
<button class="flex items-center gap-3 bg-white text-black px-6 py-3 rounded-full shadow-[0_0_20px_rgba(255,255,255,0.15)] hover:bg-gray-100 hover:scale-105 active:scale-95 transition-all duration-300 group">
<span class="material-symbols-outlined text-primary group-hover:animate-bounce" style="font-size: 22px;">download</span>
<span class="font-bold text-sm tracking-wide">Download to Watch Offline</span>
</button>
</div>
<!-- Scrub Bar Container -->
<div class="w-full flex flex-col gap-3 group/scrubber">
<!-- Time & Duration (Above Bar for cleaner look on mobile) -->
<div class="flex justify-between items-end px-1">
<div class="flex flex-col">
<span class="text-xs text-primary font-bold mb-0.5">Buffering...</span>
<p class="text-sm font-medium text-white font-display tracking-wide">
                            14:02 <span class="text-white/40 mx-1">/</span> <span class="text-white/60">1:45:00</span>
</p>
</div>
<!-- Quality Badge -->
<div class="px-1.5 py-0.5 rounded bg-white/10 border border-white/10 backdrop-blur-sm">
<span class="text-[10px] font-bold text-white/80">4K HDR</span>
</div>
</div>
<!-- Progress Bar -->
<div class="relative h-2 w-full bg-white/20 rounded-full cursor-pointer overflow-visible flex items-center">
<!-- Buffer Line -->
<div class="absolute top-0 left-0 h-full w-[45%] bg-white/20 rounded-full"></div>
<!-- Progress Line -->
<div class="absolute top-0 left-0 h-full w-[14%] bg-primary rounded-full z-10"></div>
<!-- Scrubber Thumb (Visible on hover/group) -->
<div class="absolute left-[14%] w-4 h-4 bg-white rounded-full shadow-lg z-20 scale-100 md:scale-0 md:group-hover/scrubber:scale-100 transition-transform duration-200 hover:scale-125 cursor-grab"></div>
</div>
</div>
<!-- Bottom Action Row -->
<div class="flex items-center justify-between mt-6 px-1">
<!-- Volume Controls -->
<div class="flex items-center gap-3 group/volume">
<button class="text-white/70 hover:text-white transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
<!-- Volume Slider (Hidden on small mobile, visible on larger or interaction) -->
<div class="w-20 h-1 bg-white/20 rounded-full overflow-hidden hidden sm:block">
<div class="h-full w-3/4 bg-white rounded-full"></div>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex items-center gap-6">
<!-- Subtitles -->
<button class="flex items-center gap-1 text-white/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 22px;">closed_caption</span>
<span class="text-xs font-bold">EN</span>
</button>
<!-- Episodes / Playlist -->
<button class="flex items-center gap-1 text-white/70 hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 22px;">video_library</span>
</button>
<!-- Settings -->
<button class="text-white/70 hover:text-white transition-colors rotate-0 hover:rotate-90 duration-500">
<span class="material-symbols-outlined" style="font-size: 22px;">settings</span>
</button>
</div>
</div>
<!-- Safe Area Spacer for iOS Home Indicator -->
<div class="h-5 w-full"></div>
</div>
</div>
<!-- Initialization Script (Optional interactivity simulation) -->
<script>
        // No JS logic included as per instructions, pure visual design.
    </script>
</body></html>
