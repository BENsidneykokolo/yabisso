<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Mobile Push Notification</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styling -->
<style data-purpose="font-and-theme">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
      color: #fff;
    }

    /* Blur effect for the lock screen background */
    .glass-effect {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
<style data-purpose="layout-positioning">
    .ios-screen {
      width: 375px;
      height: 812px;
      margin: 20px auto;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      /* Simulated Lock Screen Background - Abstract African patterns or dark gradient */
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      box-shadow: 0 0 0 10px #333;
    }
    
    .status-bar {
      height: 44px;
      padding: 0 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
    }

    .notification-container {
      padding: 20px 12px;
    }
  </style>
<!-- END: Custom Styling -->
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- BEGIN: Mobile Device Simulation -->
<main class="ios-screen" data-purpose="mobile-ios-container">
<!-- BEGIN: Top Status Bar -->
<header class="status-bar" data-purpose="ios-status-bar">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"></path></svg>
</div>
</header>
<!-- END: Top Status Bar -->
<!-- BEGIN: Lock Screen Time Display -->
<section class="text-center mt-12 mb-8" data-purpose="lockscreen-clock">
<h1 class="text-7xl font-semibold tracking-tighter opacity-90">09:41</h1>
<p class="text-lg font-medium opacity-80">Mardi 24 Octobre</p>
</section>
<!-- END: Lock Screen Time Display -->
<!-- BEGIN: Notification Center -->
<section class="notification-container" data-purpose="ios-notification-center">
<!-- BEGIN: Push Notification Card -->
<article class="glass-effect rounded-3xl p-4 shadow-2xl animate-in fade-in slide-in-from-top duration-500">
<!-- Header of the notification -->
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<!-- App Icon Placeholder (African Tech Vibe Purple/Orange) -->
<div class="w-6 h-6 rounded-md bg-gradient-to-br from-purple-600 to-orange-500 flex items-center justify-center text-[10px] font-bold" data-purpose="app-icon">
              Y
            </div>
<span class="text-xs font-semibold text-gray-200 uppercase tracking-wide">YABISSO</span>
</div>
<span class="text-[10px] text-gray-400">maintenant</span>
</div>
<!-- Notification Body -->
<div class="flex flex-col gap-0.5">
<h2 class="text-[15px] font-bold text-white">En cours de livraison</h2>
<p class="text-[14px] leading-snug text-gray-200">
            Kofi A. est en route avec votre commande ! Arrivée prévue dans <span class="font-bold text-orange-400">15 min</span>.
          </p>
</div>
<!-- Progress/Action Bar (Optional Visual Hint) -->
<div class="mt-3 h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-orange-500 w-2/3 rounded-full"></div>
</div>
</article>
<!-- END: Push Notification Card -->
</section>
<!-- END: Notification Center -->
<!-- BEGIN: Lock Screen Bottom Shortcuts -->
<footer class="absolute bottom-10 w-full px-12 flex justify-between items-center" data-purpose="ios-bottom-shortcuts">
<div class="w-12 h-12 rounded-full glass-effect flex items-center justify-center">
<svg class="w-6 h-6" fill="white" viewbox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
</div>
<div class="w-12 h-12 rounded-full glass-effect flex items-center justify-center">
<svg class="w-6 h-6" fill="white" viewbox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"></path></svg>
</div>
</footer>
<!-- END: Lock Screen Bottom Shortcuts -->
<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white rounded-full opacity-40"></div>
</main>
<!-- END: Mobile Device Simulation -->
</body></html>
