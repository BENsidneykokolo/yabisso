<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Push Notification - Lock Screen</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- BEGIN: Custom Typography Styles -->
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
<!-- END: Custom Typography Styles -->
<!-- BEGIN: Layout Styles -->
<style data-purpose="layout">
    .ios-lock-screen {
      /* Simulating a phone screen background */
      background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
      overflow: hidden;
    }
    
    .blur-backdrop {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
<!-- END: Layout Styles -->
</head>
<body class="bg-black text-white antialiased">
<!-- BEGIN: Mobile UI Container -->
<main class="ios-lock-screen relative w-full max-w-[430px] mx-auto overflow-hidden">
<!-- BEGIN: Top Status Bar -->
<header class="w-full px-8 flex justify-between items-center mb-12 opacity-90" data-purpose="ios-status-bar">
<div class="text-sm font-semibold">9:41</div>
<div class="flex space-x-1.5 items-center">
<!-- Cellular Bars -->
<div class="flex space-x-0.5 items-end h-3">
<div class="w-0.5 h-1 bg-white rounded-full"></div>
<div class="w-0.5 h-1.5 bg-white rounded-full"></div>
<div class="w-0.5 h-2 bg-white rounded-full"></div>
<div class="w-0.5 h-2.5 bg-white rounded-full"></div>
</div>
<!-- Wifi Icon -->
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M12 21l-12-18h24z"></path></svg>
<!-- Battery -->
<div class="w-6 h-3 border border-white/50 rounded-sm relative p-0.5">
<div class="h-full w-4/5 bg-white rounded-sm"></div>
<div class="absolute -right-1 top-1 w-0.5 h-1 bg-white/50 rounded-r-sm"></div>
</div>
</div>
</header>
<!-- END: Top Status Bar -->
<!-- BEGIN: Clock Section -->
<section class="text-center mb-10" data-purpose="lock-screen-clock">
<h1 class="text-8xl font-light tracking-tight opacity-90">09:41</h1>
<p class="text-xl font-medium mt-1">Lundi 14 Octobre</p>
</section>
<!-- END: Clock Section -->
<!-- BEGIN: Notification Center Container -->
<div class="w-full px-4 space-y-2 flex flex-col items-center" data-purpose="notification-center">
<!-- BEGIN: Yabisso Push Notification -->
<article class="w-full max-w-[390px] bg-[#1c1c1e]/80 blur-backdrop rounded-[24px] p-4 shadow-xl border border-white/5" data-purpose="yabisso-push-notification">
<div class="flex items-start space-x-3">
<!-- App Icon with African Tech Aesthetic (Bold gradient) -->
<div class="flex-shrink-0">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 via-red-600 to-amber-400 flex items-center justify-center shadow-lg">
<span class="text-white font-bold text-lg italic">Y</span>
</div>
</div>
<!-- Notification Content -->
<div class="flex-1 min-w-0">
<div class="flex justify-between items-center mb-0.5">
<span class="text-xs font-semibold uppercase tracking-wider text-white/60">Yabisso</span>
<span class="text-[10px] text-white/40">maintenant</span>
</div>
<h2 class="text-[15px] font-bold text-white mb-0.5">
              Commande Validée
            </h2>
<p class="text-[14px] text-white/90 leading-tight">
              Votre commande <span class="font-mono text-orange-400">#YAB-2409</span> a été confirmée par le vendeur.
            </p>
</div>
</div>
</article>
<!-- END: Yabisso Push Notification -->
<!-- Stack Indicator (Implicit for iOS 16+) -->
<div class="w-[92%] h-2 bg-[#1c1c1e]/40 rounded-b-2xl -mt-1 blur-backdrop border-x border-b border-white/5"></div>
</div>
<!-- END: Notification Center Container -->
<!-- BEGIN: Bottom Interaction Controls -->
<footer class="absolute bottom-12 w-full px-12 flex justify-between items-center" data-purpose="ios-bottom-controls">
<!-- Flashlight -->
<button class="w-12 h-12 rounded-full bg-white/10 blur-backdrop flex items-center justify-center text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Camera -->
<button class="w-12 h-12 rounded-full bg-white/10 blur-backdrop flex items-center justify-center text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</footer>
<!-- END: Bottom Interaction Controls -->
<!-- Home Indicator -->
<div class="absolute bottom-2 w-32 h-1.5 bg-white/40 rounded-full left-1/2 -translate-x-1/2"></div>
</main>
<!-- END: Mobile UI Container -->
</body></html>
