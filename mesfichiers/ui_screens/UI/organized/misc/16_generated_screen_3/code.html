<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yabisso Push Notification - Lock Screen</title>
<!-- BEGIN: Tailwind CSS Integration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Tailwind CSS Integration -->
<!-- BEGIN: Global Styles -->
<style data-purpose="font-and-background">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Simulating an iPhone screen frame */
    .device-container {
      width: 375px;
      height: 812px;
      border: 8px solid #1a1a1a;
      border-radius: 50px;
      position: relative;
      background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }
  </style>
<style data-purpose="notification-animations">
    @keyframes slideDown {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-notification {
      animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
<!-- END: Global Styles -->
</head>
<body>
<!-- BEGIN: Mobile Device Simulation -->
<div class="device-container" data-purpose="mobile-frame">
<!-- Status Bar Area -->
<div class="flex justify-between px-8 pt-4 pb-2 text-xs font-medium opacity-80" data-purpose="status-bar">
<span>9:41</span>
<div class="flex gap-1.5">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"></path></svg>
</div>
</div>
<!-- Clock Display -->
<div class="text-center mt-12 mb-8" data-purpose="lockscreen-clock">
<h1 class="text-7xl font-light tracking-tight opacity-90">09:41</h1>
<p class="text-lg font-medium opacity-80 mt-1">Lundi 24 Juin</p>
</div>
<!-- BEGIN: Notification Center -->
<main class="px-3" data-purpose="notification-area">
<!-- Push Notification Item -->
<div class="animate-notification bg-black/40 backdrop-blur-xl rounded-[28px] p-4 border border-white/10 shadow-2xl" data-purpose="push-notification">
<!-- App Header Info -->
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<!-- App Icon Placeholder (African-themed colors) -->
<div class="w-6 h-6 bg-gradient-to-tr from-yellow-500 via-red-500 to-green-600 rounded-md flex items-center justify-center text-[10px] font-bold text-white shadow-inner">
              Y
            </div>
<span class="text-xs font-semibold tracking-wide uppercase text-white/70">YABISSO</span>
</div>
<span class="text-[10px] text-white/50">maintenant</span>
</div>
<!-- Notification Content -->
<div class="flex flex-col gap-0.5">
<h2 class="text-[15px] font-bold text-white leading-tight">
            Préparation en cours 👨‍🍳
          </h2>
<p class="text-[14px] text-white/80 leading-snug">
            Mama Africa's Kitchen prépare vos délicieux plats.
          </p>
</div>
<!-- Subtle Action Indicator -->
<div class="mt-3 flex justify-center opacity-20">
<div class="w-10 h-1 bg-white rounded-full"></div>
</div>
</div>
</main>
<!-- END: Notification Center -->
<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/40 rounded-full" data-purpose="home-indicator"></div>
<!-- Quick Access Buttons -->
<div class="absolute bottom-10 left-0 w-full flex justify-between px-12" data-purpose="quick-actions">
<div class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<div class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
</div>
</div>
<!-- END: Mobile Device Simulation -->
</body></html>
