<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notebook Folder Manager</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#eab308",
                        "yabisso-green": "#22c55e",
                        "surface-dark": "#1c2630",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "2xl": "2.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-white">
<!-- Main Container simulating the app background (partially visible behind the sheet) -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-end bg-gradient-to-br from-slate-900 to-black overflow-hidden">
<!-- Background Mock Content to simulate "overlay" feel -->
<div class="absolute inset-0 w-full h-full p-6 opacity-30 pointer-events-none flex flex-col gap-4">
<h1 class="text-4xl font-bold text-white mb-6">My Notes</h1>
<div class="w-full h-32 bg-slate-800 rounded-xl"></div>
<div class="w-full h-32 bg-slate-800 rounded-xl"></div>
<div class="w-full h-32 bg-slate-800 rounded-xl"></div>
</div>
<!-- Overlay Backdrop -->
<div class="absolute inset-0 bg-black/60 backdrop-blur-sm z-10"></div>
<!-- Bottom Sheet Container -->
<div class="relative z-20 w-full max-w-md bg-surface-dark rounded-t-3xl shadow-2xl flex flex-col max-h-[90vh] pb-8 border-t border-white/5">
<!-- Bottom Sheet Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="h-1.5 w-12 rounded-full bg-slate-600/50"></div>
</div>
<!-- Header -->
<div class="px-6 py-4 flex items-center justify-between">
<div>
<h2 class="text-2xl font-bold text-white tracking-tight">Manage Folders</h2>
<p class="text-slate-400 text-sm mt-0.5 font-medium">Organize your thoughts</p>
</div>
<!-- Optional close button for accessibility -->
<button class="flex items-center justify-center w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 text-slate-400">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Scrollable List Area -->
<div class="flex-1 overflow-y-auto px-4 py-2 space-y-1">
<!-- List Item: Personal -->
<label class="group relative flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-colors hover:bg-white/5">
<!-- Icon Container using Yabisso Green Accent -->
<div class="flex items-center justify-center shrink-0 w-12 h-12 rounded-full bg-yabisso-green/10 text-yabisso-green border border-yabisso-green/20">
<span class="material-symbols-outlined">folder_shared</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-white text-base font-semibold leading-tight">Personal</p>
<p class="text-slate-400 text-sm mt-0.5">15 notes</p>
</div>
<div class="shrink-0">
<input checked="" class="peer sr-only" name="folder_select" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-slate-600 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-transform">check</span>
</div>
</div>
</label>
<!-- List Item: Business -->
<label class="group relative flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-colors hover:bg-white/5">
<!-- Icon Container using Primary Blue -->
<div class="flex items-center justify-center shrink-0 w-12 h-12 rounded-full bg-primary/10 text-primary border border-primary/20">
<span class="material-symbols-outlined">business_center</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-white text-base font-semibold leading-tight">Business</p>
<p class="text-slate-400 text-sm mt-0.5">4 projects</p>
</div>
<div class="shrink-0">
<input class="peer sr-only" name="folder_select" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-slate-600 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-transform">check</span>
</div>
</div>
</label>
<!-- List Item: Ideas -->
<label class="group relative flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-colors hover:bg-white/5">
<!-- Icon Container using Yabisso Yellow Accent -->
<div class="flex items-center justify-center shrink-0 w-12 h-12 rounded-full bg-yabisso-yellow/10 text-yabisso-yellow border border-yabisso-yellow/20">
<span class="material-symbols-outlined">lightbulb</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-white text-base font-semibold leading-tight">Ideas</p>
<p class="text-slate-400 text-sm mt-0.5">23 ideas</p>
</div>
<div class="shrink-0">
<input class="peer sr-only" name="folder_select" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-slate-600 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-transform">check</span>
</div>
</div>
</label>
<!-- List Item: Private (Locked) -->
<label class="group relative flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-colors hover:bg-white/5 opacity-80">
<!-- Icon Container using Yabisso Red Accent -->
<div class="flex items-center justify-center shrink-0 w-12 h-12 rounded-full bg-yabisso-red/10 text-yabisso-red border border-yabisso-red/20 relative">
<span class="material-symbols-outlined">lock</span>
<!-- Subtle indicator dot -->
<span class="absolute top-0 right-0 w-3 h-3 bg-surface-dark rounded-full flex items-center justify-center">
<span class="w-2 h-2 bg-yabisso-red rounded-full"></span>
</span>
</div>
<div class="flex flex-col flex-1">
<div class="flex items-center gap-2">
<p class="text-white text-base font-semibold leading-tight">Private</p>
<span class="px-1.5 py-0.5 rounded bg-yabisso-red/20 text-yabisso-red text-[10px] font-bold uppercase tracking-wider">Locked</span>
</div>
<p class="text-slate-400 text-sm mt-0.5">Hidden • 7 notes</p>
</div>
<div class="shrink-0">
<!-- Lock icon instead of radio for interaction hint -->
<span class="material-symbols-outlined text-slate-500 text-xl">chevron_right</span>
</div>
</label>
<!-- Divider -->
<div class="h-px w-full bg-white/5 my-2 mx-4"></div>
<!-- Create New Folder Action -->
<button class="w-full flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-colors hover:bg-white/5 text-left group">
<div class="flex items-center justify-center shrink-0 w-12 h-12 rounded-full bg-slate-700/50 text-slate-300 border border-slate-600/50 group-hover:border-primary/50 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">add</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-white group-hover:text-primary transition-colors text-base font-semibold leading-tight">Create New Folder</p>
<p class="text-slate-400 text-sm mt-0.5">Add a custom category</p>
</div>
</button>
</div>
<!-- Footer Action -->
<div class="p-6 pt-4 mt-auto">
<button class="w-full h-14 bg-white hover:bg-slate-200 text-black text-lg font-bold rounded-full shadow-lg shadow-white/5 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Done</span>
</button>
</div>
</div>
</div>
</body></html>
