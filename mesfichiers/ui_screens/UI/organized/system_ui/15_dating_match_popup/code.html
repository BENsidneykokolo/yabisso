<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dating Match Popup</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#eab308",
                        "yabisso-green": "#22c55e",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom utilities if needed */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex min-h-screen w-full flex-col items-center justify-end pb-8 pt-12 overflow-hidden bg-background-dark">
<!-- Background Effects -->
<div class="absolute inset-0 z-0">
<!-- Gradient Glow -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-primary/20 rounded-full blur-[100px]"></div>
<!-- Confetti Elements (Static CSS implementation for "African Tech Vibe") -->
<div class="absolute top-[15%] left-[20%] w-3 h-3 bg-yabisso-red rounded-full opacity-80" style="transform: rotate(15deg);"></div>
<div class="absolute top-[25%] left-[80%] w-4 h-4 bg-yabisso-yellow rounded-sm opacity-80" style="transform: rotate(45deg);"></div>
<div class="absolute top-[18%] right-[25%] w-3 h-3 bg-yabisso-green rounded-full opacity-80"></div>
<div class="absolute top-[10%] left-[50%] w-2 h-2 bg-primary rounded-full opacity-60"></div>
<div class="absolute top-[30%] left-[10%] w-3 h-6 bg-yabisso-red rounded-full opacity-70" style="transform: rotate(-15deg);"></div>
<div class="absolute top-[22%] right-[10%] w-4 h-4 border-2 border-yabisso-yellow rounded-full opacity-70"></div>
</div>
<!-- Main Content Wrapper -->
<div class="relative z-10 flex flex-1 flex-col items-center justify-center w-full max-w-md px-6">
<!-- Avatars Section -->
<div class="relative flex items-center justify-center mb-10 w-full">
<!-- Left Avatar (User) -->
<div class="relative z-10 transform translate-x-4 transition-transform duration-500">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-background-dark shadow-xl overflow-hidden bg-gray-800">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Portrait of a smiling young African man in a casual shirt" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXskvwu8FiIbUXzkCjkuYoOYyFTFzle9bmYtPlFN9yyqwtaDI1QiwsE5unIb1JdGryuWT04ZJ2p8zTAxwHnEkl9b_Q88ti_kh6XfJOakx8Vd7TPXXB4Wxf6JbLFjbOV6Q3avoEwqb6LYtIu-uBGugR52Nljw30i9v--QtJp4J8r2IqaSy5pyLDEAOOOxiQZPU5i-Y2MTsrNd4y4KETjYyhCaxlWDPTLlqXHMR-f_dCRua2WCYsIQoCy_i0viRpQkhv3nZ-YaO7"/>
</div>
</div>
<!-- Center Connector Icon -->
<div class="absolute z-30 bg-white rounded-full p-3 shadow-[0_0_20px_rgba(19,127,236,0.3)] flex items-center justify-center transform -translate-y-1/2 top-1/2">
<span class="material-symbols-outlined text-primary text-[32px] md:text-[40px] leading-none fill-1">favorite</span>
</div>
<!-- Right Avatar (Match) -->
<div class="relative z-20 transform -translate-x-4 transition-transform duration-500">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-background-dark shadow-xl overflow-hidden bg-gray-800">
<img alt="Match Avatar" class="w-full h-full object-cover" data-alt="Portrait of a smiling young African woman with braided hair" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiILFs5k19RpXvWWDvqwNDVXOBexw-zoDa0Co2U5G4sPhuZPwMRXjqKt58CMSenYb5Hn7AVMi78ruzAXjysmHCBMXrHrUOhounvMN2BK42MCLe5nwmXKfhHBVyGy7qr9_ViwlIeiVsN6s6rPPB0qxsIilABaICR6JiJ4181WuB09MvuRlpcaVjpNTVnysEyREMWIZh-Vas49lyfg5ymdTe1ro7ulJGseRQmcg-erTJsHDbX3mSu_GjgHkfYVUBIz_osMv5_G8K"/>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-12 space-y-3">
<h1 class="text-4xl md:text-5xl font-black tracking-tight text-white drop-shadow-sm">
                    It's a Match <span class="align-middle text-4xl">🎉</span>
</h1>
<p class="text-lg md:text-xl text-gray-300 font-medium leading-relaxed max-w-[280px] mx-auto">
                    You and Sarah like each other
                </p>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-4">
<!-- Primary Action: Start Chat -->
<button class="group relative flex w-full cursor-pointer items-center justify-center rounded-full bg-white h-14 px-6 transition-transform active:scale-95 shadow-[0_0_15px_rgba(255,255,255,0.15)] hover:bg-gray-50">
<span class="material-symbols-outlined text-background-dark mr-2 text-[24px]">chat_bubble</span>
<span class="text-background-dark text-base font-bold tracking-wide">Start chat</span>
</button>
<!-- Secondary Action: Voice Greeting -->
<button class="group relative flex w-full cursor-pointer items-center justify-center rounded-full glass-panel h-14 px-6 transition-all active:scale-95 hover:bg-white/10">
<span class="material-symbols-outlined text-white mr-2 text-[24px]">mic</span>
<span class="text-white text-base font-bold tracking-wide">Send voice greeting</span>
</button>
</div>
</div>
<!-- Footer / Dismiss -->
<div class="relative z-10 w-full px-6 pt-6 pb-2 text-center">
<button class="text-gray-400 text-sm font-semibold hover:text-white transition-colors py-2">
                Keep swiping
            </button>
</div>
</div>
</body></html>
