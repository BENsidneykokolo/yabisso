<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rating Pop-up</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#1c2a38",
                        "brand-yellow": "#fbbf24",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for text area if needed */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #374151;
            border-radius: 20px;
        }
        
        /* Material Symbols overrides */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.unfilled {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-900 font-display antialiased overflow-hidden">
<!-- Mock Background Application Layer (Blurred/Dimmed) -->
<div class="relative h-screen w-full flex flex-col items-center justify-end sm:justify-center bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=1000&amp;q=80')] bg-cover bg-center" data-alt="Abstract dark gradient background of a map or city at night">
<div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
<!-- Rating Bottom Sheet / Modal -->
<div class="relative z-10 w-full max-w-[420px] rounded-t-3xl sm:rounded-3xl bg-background-dark shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/5 overflow-hidden flex flex-col max-h-[95vh]">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-5 pb-2 cursor-grab active:cursor-grabbing">
<div class="h-1.5 w-12 rounded-full bg-gray-600/50"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-6 pt-2 no-scrollbar">
<!-- Profile Header -->
<div class="flex flex-col items-center gap-4 mb-8">
<div class="relative group">
<div class="h-24 w-24 rounded-full p-1 bg-gradient-to-tr from-[#137fec] to-[#fbbf24]">
<img alt="Portrait of Samuel, the driver, smiling" class="h-full w-full rounded-full object-cover border-4 border-background-dark bg-surface-dark" data-alt="Portrait of Samuel the driver" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtaEbvPD8b-NPzjafgsh-jGhzImtgD01YVL1oSYzC1CaNFrSp2G8X0P6ZcDj1xopyiknzcpYv1EPllnG6GULv_Vg2zhHqakhliANu0F_-q2WPReJxylFzHwz4Uhq0VxcVeSrRhDA4ekdUaaf2owc-zsmsTHdw06fon_OXJwafVR7IN3Wg3s3pBvyRusRYPljB_x6A09NNkGyNU_Lb_H5L0WYWdQGGEm20hzzWnZWwU5RGv8SkGR3SC_as4EVwFEHKqNkzDVr-Z"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-background-dark rounded-full p-1.5 border border-surface-dark">
<span class="material-symbols-outlined text-green-500 text-[18px]">verified</span>
</div>
</div>
<div class="text-center space-y-1">
<h2 class="text-white text-2xl font-bold tracking-tight">How was your trip?</h2>
<p class="text-gray-400 text-sm font-medium">Samuel • Toyota Corolla • KBZ 123</p>
</div>
</div>
<!-- Star Rating Interaction -->
<div class="flex justify-center gap-3 mb-8">
<button class="group focus:outline-none transform hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-4xl text-brand-yellow">star</span>
</button>
<button class="group focus:outline-none transform hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-4xl text-brand-yellow">star</span>
</button>
<button class="group focus:outline-none transform hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-4xl text-brand-yellow">star</span>
</button>
<button class="group focus:outline-none transform hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-4xl text-brand-yellow">star</span>
</button>
<button class="group focus:outline-none transform hover:scale-110 transition-transform">
<span class="material-symbols-outlined unfilled text-4xl text-gray-600 hover:text-brand-yellow/50 transition-colors">star</span>
</button>
</div>
<!-- Quick Feedback Chips -->
<div class="mb-6">
<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 text-center">What went well?</p>
<div class="flex flex-wrap justify-center gap-2.5">
<button class="px-4 py-2 rounded-lg bg-surface-dark border border-transparent text-gray-300 text-sm font-medium hover:bg-surface-dark/80 hover:border-gray-600 transition-all focus:ring-2 focus:ring-primary/50 focus:outline-none">
                            Clean Vehicle
                        </button>
<button class="px-4 py-2 rounded-lg bg-primary/20 border border-primary text-primary text-sm font-medium transition-all shadow-[0_0_10px_rgba(19,127,236,0.15)]">
                            Friendly
                        </button>
<button class="px-4 py-2 rounded-lg bg-surface-dark border border-transparent text-gray-300 text-sm font-medium hover:bg-surface-dark/80 hover:border-gray-600 transition-all">
                            Safe Driving
                        </button>
<button class="px-4 py-2 rounded-lg bg-surface-dark border border-transparent text-gray-300 text-sm font-medium hover:bg-surface-dark/80 hover:border-gray-600 transition-all">
                            Good Music
                        </button>
</div>
</div>
<!-- Feedback Input -->
<div class="mb-2">
<div class="relative group/input">
<textarea class="w-full min-h-[100px] rounded-xl bg-surface-dark border border-gray-700/50 text-white placeholder-gray-500 p-4 text-base focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all resize-none peer" placeholder="Tell us more... (optional)"></textarea>
<div class="absolute bottom-3 right-3 text-gray-600 pointer-events-none transition-opacity opacity-0 peer-focus:opacity-100 peer-placeholder-shown:opacity-0">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 pt-2 bg-gradient-to-t from-background-dark to-background-dark/95 backdrop-blur-xl">
<button class="w-full flex items-center justify-center h-14 rounded-xl bg-white text-background-dark text-lg font-bold hover:bg-gray-100 active:scale-[0.98] transition-all shadow-lg shadow-white/10 mb-4">
                    Submit Rating
                </button>
<button class="w-full flex items-center justify-center text-gray-500 text-sm font-medium hover:text-white transition-colors">
                    Skip feedback
                </button>
</div>
</div>
</div>
</body></html>
