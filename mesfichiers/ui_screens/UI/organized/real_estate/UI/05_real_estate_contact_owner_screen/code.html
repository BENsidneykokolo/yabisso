<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact Owner - Yabisso</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "yabisso-red": "#ef4444",
                        "yabisso-yellow": "#eab308",
                        "yabisso-green": "#22c55e",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#192633",
                        "input-bg": "#233648",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white antialiased">
<!-- Mobile Container -->
<div class="relative flex min-h-screen flex-col overflow-hidden bg-background-light dark:bg-background-dark max-w-md mx-auto shadow-2xl border-x border-gray-800">
<!-- TopAppBar -->
<div class="flex items-center bg-background-dark/95 backdrop-blur-sm sticky top-0 z-50 p-4 pb-2 justify-between">
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full bg-surface-dark cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">arrow_back_ios_new</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Contact Owner</h2>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- Property Summary Card -->
<div class="px-4 py-2">
<div class="flex items-center justify-between gap-3 rounded-xl bg-surface-dark p-3 shadow-lg border border-white/5">
<div class="size-20 shrink-0 rounded-lg bg-center bg-no-repeat bg-cover" data-alt="Modern apartment interior with warm lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuANLIaLmZ4wxiBWiRCdiTZ_0ryCExNP2duTD8pfdDc4VhOm9Sn-r4kSVR8_SW9JRe3NyCU5z4bxr-QdaWazRHdSv7jSQ6VN3quaIha-jQIutWw6TIuvKv8y9zxn4IiEM_6gdsdDSC4rkeOoR6aGXeKJohTChplBYJqgoMrYBIEQemiEwBOatcbnwzc0ArEygSEJYrS_gONr_1JsLPl_ISc-Wdow3o6SkRr-syHsgkM8vrXZYLPo0CEtEZN_kcsLewlI9Z-jTLxd");'>
</div>
<div class="flex flex-col gap-1 flex-1 min-w-0">
<p class="text-[#92adc9] text-xs font-medium uppercase tracking-wide">Douala, Bonapriso</p>
<p class="text-white text-sm font-bold leading-tight truncate">Sunny 3-Bedroom Apartment</p>
<p class="text-primary text-sm font-bold leading-normal">150,000 XAF <span class="text-[#92adc9] font-normal text-xs">/ mo</span></p>
</div>
</div>
</div>
<!-- Agent/Owner Profile -->
<div class="px-4 py-4">
<div class="flex items-center gap-4">
<div class="relative">
<div class="size-14 rounded-full bg-cover bg-center border-2 border-primary" data-alt="Portrait of a smiling real estate agent" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDz2KZLT2Zue-jANfLG_JDOInNJTn_SAqeU06hWbPSxRYGjNQig351IwzLCOKkblpAaUU04voIUBFlqB6yWd-t5hGooipE8zXK1GxFW2CKFX8hWAgfcCmKP9IY4u7WOAOq2BkIUxaUS2ZZvzhJoO9OAO0FZaRWtRkRBtVTdYcDdOS7z0kEV0aXrlN6eltki1BRqixkw6hFSwhQjQHj5v2Rptlridk5th3BVOrX8Ss1iXWrzl2Z5LBgsDa4OU4KPCPfme8xljGzX");'>
</div>
<div class="absolute bottom-0 right-0 size-3.5 bg-yabisso-green rounded-full border-2 border-background-dark"></div>
</div>
<div class="flex-1">
<p class="text-xs text-[#92adc9]">Replying to</p>
<p class="text-white text-base font-bold">Amara Ndiaye</p>
<div class="flex items-center gap-1 mt-0.5">
<span class="material-symbols-outlined text-[14px] text-yabisso-yellow">bolt</span>
<p class="text-xs text-[#92adc9]">Replies typically in &lt; 1 hr</p>
</div>
</div>
</div>
</div>
<!-- User Information (Auto-filled) -->
<div class="px-4 pt-2">
<h3 class="text-white text-sm font-bold uppercase tracking-wider text-opacity-70 mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-primary">person</span>
                    Your Details
                </h3>
<div class="flex flex-col gap-3">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[#92adc9] text-[20px]">badge</span>
</div>
<input class="w-full rounded-xl bg-input-bg border border-transparent focus:border-primary focus:ring-1 focus:ring-primary text-white h-12 pl-12 pr-4 text-sm font-medium placeholder-[#5c728a] transition-all" placeholder="Full Name" value="Malik Ousmane"/>
</div>
<div class="flex gap-3">
<div class="relative flex-1 group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[#92adc9] text-[20px]">call</span>
</div>
<input class="w-full rounded-xl bg-input-bg border border-transparent focus:border-primary focus:ring-1 focus:ring-primary text-white h-12 pl-12 pr-4 text-sm font-medium placeholder-[#5c728a] transition-all" placeholder="Phone" value="+237 671 23 45"/>
</div>
</div>
</div>
</div>
<div class="h-6"></div>
<!-- Message Section -->
<div class="px-4">
<h3 class="text-white text-sm font-bold uppercase tracking-wider text-opacity-70 mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-primary">chat</span>
                    Message
                </h3>
<!-- Quick Tags -->
<div class="flex gap-2 overflow-x-auto no-scrollbar mb-3 pb-1">
<button class="shrink-0 rounded-full bg-[#192633] border border-yabisso-green/30 hover:bg-yabisso-green/10 px-4 py-2 text-xs font-medium text-white transition-colors flex items-center gap-1">
<span>👋 Is it available?</span>
</button>
<button class="shrink-0 rounded-full bg-[#192633] border border-yabisso-yellow/30 hover:bg-yabisso-yellow/10 px-4 py-2 text-xs font-medium text-white transition-colors flex items-center gap-1">
<span>📅 Schedule visit</span>
</button>
<button class="shrink-0 rounded-full bg-[#192633] border border-yabisso-red/30 hover:bg-yabisso-red/10 px-4 py-2 text-xs font-medium text-white transition-colors flex items-center gap-1">
<span>💰 Negotiate price</span>
</button>
</div>
<div class="relative">
<textarea class="w-full rounded-xl bg-input-bg border border-transparent focus:border-primary focus:ring-1 focus:ring-primary text-white min-h-[140px] p-4 text-base font-normal leading-relaxed placeholder-[#5c728a] resize-none transition-all" placeholder="Hi Amara, I am interested in this apartment. Is it still available for viewing this weekend?"></textarea>
<!-- Character count or corner accent could go here -->
</div>
<p class="text-right text-xs text-[#5c728a] mt-2">124 / 500 characters</p>
</div>
<div class="h-4"></div>
</div>
<!-- Sticky Footer -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-dark via-background-dark to-transparent pt-8">
<button class="w-full rounded-xl bg-white h-14 flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-[0.98] transition-transform">
<span class="text-background-dark text-base font-bold">Send Message</span>
<span class="material-symbols-outlined text-background-dark text-[20px]">send</span>
</button>
<div class="flex justify-center items-center gap-1.5 mt-3 opacity-60">
<span class="material-symbols-outlined text-[12px] text-yabisso-green">lock</span>
<p class="text-[10px] text-[#92adc9] text-center">Your contact details are shared securely.</p>
</div>
</div>
</div>
</body></html>
